<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d6efd">
    
    <!-- CSP CRÍTICO 100% LOCAL (0% CDNs) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost data: gap: https://kenth1977.pythonanywhere.com http://127.0.0.1:5000; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://kenth1977.pythonanywhere.com capacitor://localhost http://localhost http://127.0.0.1:5000; font-src 'self' data:;">
    
    <title>Motor Universal App</title>
    
    <link href="css/main.css" rel="stylesheet">
</head>
<body>

    <!-- ==========================================
         CASCARÓN DE LA APP (SHELL)
    =========================================== -->

    <nav class="navbar navbar-dark bg-primary top-navbar d-none position-fixed w-100 top-0 z-3" id="app-header" style="padding-top: calc(0.5rem + env(safe-area-inset-top, 0px)); padding-bottom: 0.5rem;">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            
            <div class="d-flex align-items-center">
                <button class="btn btn-link text-white p-0 text-decoration-none me-3 d-none" id="btn-global-back" onclick="window.irAtrasGlobal()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
                    </svg>
                </button>
                <span class="navbar-brand mb-0 h1 fw-bold" id="view-title">Inicio</span>
            </div>

            <button class="btn btn-link text-white p-0 text-decoration-none" id="btn-theme-toggle" onclick="
                const current = document.documentElement.getAttribute('data-bs-theme');
                const nextTheme = current === 'dark' ? 'claro' : 'oscuro';
                
                if (window.ThemeManager) {
                    if (window.ThemeManager.guardarPreferenciaTema) {
                        window.ThemeManager.guardarPreferenciaTema(nextTheme);
                    } else if (window.ThemeManager.cambiarTema) {
                        window.ThemeManager.cambiarTema(nextTheme);
                    } else if (window.ThemeManager.aplicarTema) {
                        window.ThemeManager.aplicarTema(nextTheme);
                    }
                }
                
                const icon = document.getElementById('header-theme-icon');
                if (icon) {
                    if (nextTheme === 'oscuro') { 
                        icon.classList.remove('bi-moon-stars-fill');
                        icon.classList.add('bi-sun-fill'); 
                    } else { 
                        icon.classList.remove('bi-sun-fill');
                        icon.classList.add('bi-moon-stars-fill'); 
                    }
                }
            ">
                <i class="bi bi-moon-stars-fill fs-5" id="header-theme-icon"></i>
            </button>
        </div>
    </nav>

    <div id="app-root" class="container-fluid fade-in" style="padding-top: calc(56px + env(safe-area-inset-top, 0px)); padding-bottom: calc(70px + env(safe-area-inset-bottom, 0px));">
        <div class="d-flex flex-column justify-content-center align-items-center h-100" style="min-height: 80vh;">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted fw-bold small" id="loading-text">Conectando Motor SQLite...</p>
        </div>
    </div>

    <nav class="bottom-nav d-none justify-content-around position-fixed w-100 bottom-0 z-3 bg-white border-top" id="app-bottom-nav" style="padding-bottom: max(env(safe-area-inset-bottom), 10px); padding-top: 10px;">
        <div class="nav-item text-center active" id="nav-inicio" onclick="window.cargarVista('inicio', 'Inicio')">
            <i class="bi bi-house-fill fs-4"></i>
            <span>Inicio</span>
        </div>
        <div class="nav-item text-center text-secondary" id="nav-perfil" onclick="window.cargarVista('perfil', 'Mi Perfil')">
            <i class="bi bi-person-circle fs-4"></i>
            <span>Perfil</span>
        </div>
    </nav>

    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050; margin-top: 60px;">
        <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header text-white" id="toast-header">
                <i class="bi bi-info-circle me-2"></i>
                <strong class="me-auto" id="toast-title">Notificación</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body bg-white fw-medium" id="toast-message"></div>
        </div>
    </div>

    <div class="modal fade" id="modalResetDB" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-body text-center p-4 pb-2" id="reset-db-body">
                </div>
                <div class="modal-footer d-flex justify-content-center border-0 pt-0 pb-4 gap-2" id="reset-db-footer">
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         VISTAS DE LA APP (FRAGMENTOS)
    =========================================== -->

    <!-- VISTA: LOGIN -->
    <template id="tpl-login">
        <div class="row justify-content-center align-items-center" style="min-height: 80vh; padding-bottom: 50px;">
            <div class="col-12 col-md-8 col-lg-6 text-center">
                <div class="mb-4 mt-4">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center shadow" style="width: 80px; height: 80px;">
                        <i class="bi bi-rocket-takeoff fs-1"></i>
                    </div>
                    <h2 class="mt-3 fw-bold text-dark">Bienvenido de nuevo</h2>
                    <p class="text-muted">Ingresa tus credenciales para acceder</p>
                </div>

                <div class="card app-card text-start border-0 shadow-sm">
                    <div class="card-body p-4">
                        <!-- IMPORTANTE: EL FORMULARIO AHORA DELEGA LA ACCIÓN DE LOGIN EN iniciarSesionApp(event) DE auth.js -->
                        <form id="form-login" onsubmit="window.iniciarSesionApp(event);">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" id="login-email" class="form-control border-start-0 ps-0 bg-light" placeholder="tu@correo.com" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                    <!-- IMPORTANTE: EL ID CAMBIÓ DE login-pass A login-password PARA COINCIDIR CON TOGGLEPASSWORD -->
                                    <input type="password" id="login-password" class="form-control border-start-0 border-end-0 ps-0 bg-light" placeholder="••••••••" required>
                                    <span class="input-group-text bg-light border-start-0 cursor-pointer btn-toggle-password" onclick="window.togglePassword('login-password', 'icono-ojo-login')">
                                        <i class="bi bi-eye-slash text-muted" id="icono-ojo-login"></i>
                                    </span>
                                </div>
                            </div>
                            
                            <!-- CHECKBOX PARA RECORDAR CONTRASEÑA -->
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input cursor-pointer" id="login-recordar">
                                <label class="form-check-label text-muted small" for="login-recordar" style="cursor: pointer;">Recordar mis credenciales para el próximo ingreso</label>
                            </div>
                            
                            <div id="login-error" class="alert alert-danger d-none py-2 small fw-bold" role="alert"></div>

                            <button type="submit" id="btn-login-submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm mb-3 mt-2 d-flex justify-content-center align-items-center">
                                <!-- EL SPINNER SE OCULTA INICIALMENTE -->
                                <span class="spinner-border spinner-border-sm me-2 d-none" role="status" aria-hidden="true" id="login-spinner"></span>
                                INGRESAR AL SISTEMA
                            </button>
                            
                            <button type="button" id="btn-bio-login" class="btn btn-outline-secondary w-100 py-2 fw-bold rounded-pill" onclick="window.ejecutarLoginBiometrico();">
                                <i class="bi bi-fingerprint fs-5 me-2 align-middle"></i> Acceso Biométrico
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="mt-4 pt-3 border-top">
                    <p class="text-muted small mb-1">¿Aún no eres parte de la plataforma?</p>
                    <button class="btn btn-link text-primary fw-bold text-decoration-none p-0" onclick="window.cargarVista('registro', 'Registro')">Crear una cuenta nueva</button>
                </div>
            </div>
            <!-- Llamada silenciosa a la carga de credenciales (Opcional, si no funciona, usar DOMContentLoaded) -->
            <img src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" onload="if(window.cargarCredencialesGuardadas) window.cargarCredencialesGuardadas();" style="display:none;">
        </div>
    </template>

    <!-- VISTA: REGISTRO -->
    <template id="tpl-registro">
        <div class="row justify-content-center align-items-center pb-5">
            <div class="col-12 col-md-8 col-lg-6 text-center">
                <div class="mb-4 mt-3">
                    <h2 class="fw-bold text-dark mb-1">Crear Cuenta</h2>
                    <p class="text-muted small">Completa tus datos reales para unirte</p>
                </div>

                <div class="card app-card text-start border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <form id="form-registro" onsubmit="event.preventDefault(); window.RegistroManager.procesarRegistro();">
                            
                            <h6 class="fw-bold text-primary mb-3 small border-bottom pb-2"><i class="bi bi-person-lines-fill me-2"></i>DATOS PERSONALES</h6>
                            
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Nombre(s) <span class="text-danger">*</span></label>
                                <input type="text" id="reg-nombre" class="form-control bg-light" placeholder="Ej: Juan Carlos" required>
                                <div class="invalid-feedback" id="err-nombre">Solo letras. Máx 1 espacio. Primera letra mayúscula.</div>
                            </div>

                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <label class="form-label text-muted small fw-bold">1er Apellido <span class="text-danger">*</span></label>
                                    <input type="text" id="reg-apellido1" class="form-control bg-light" placeholder="Ej: Perez" required>
                                    <div class="invalid-feedback" id="err-apellido1">Sin espacios ni números.</div>
                                </div>
                                <div class="col-6">
                                    <label class="form-label text-muted small fw-bold">2do Apellido</label>
                                    <input type="text" id="reg-apellido2" class="form-control bg-light" placeholder="Opcional">
                                    <div class="invalid-feedback" id="err-apellido2">Sin espacios ni números.</div>
                                </div>
                            </div>

                            <label class="form-label text-muted small fw-bold mb-1">Fecha de Nacimiento <span class="text-danger">*</span></label>
                            <div class="row g-2 mb-1">
                                <div class="col-3">
                                    <input type="number" id="reg-dia" class="form-control bg-light text-center" placeholder="DD" min="1" max="31" required>
                                </div>
                                <div class="col-5">
                                    <select id="reg-mes" class="form-select bg-light" required>
                                        <option value="" selected disabled>Mes</option>
                                        <option value="01">Ene</option>
                                        <option value="02">Feb</option>
                                        <option value="03">Mar</option>
                                        <option value="04">Abr</option>
                                        <option value="05">May</option>
                                        <option value="06">Jun</option>
                                        <option value="07">Jul</option>
                                        <option value="08">Ago</option>
                                        <option value="09">Sep</option>
                                        <option value="10">Oct</option>
                                        <option value="11">Nov</option>
                                        <option value="12">Dic</option>
                                    </select>
                                </div>
                                <div class="col-4">
                                    <input type="number" id="reg-anio" class="form-control bg-light text-center" placeholder="AAAA" min="1900" max="2026" required>
                                </div>
                            </div>
                            <div class="mb-4 d-flex justify-content-between align-items-center px-1">
                                <small class="text-danger d-none" id="err-fecha">Fecha inválida.</small>
                                <span class="badge bg-secondary rounded-pill d-none px-3" id="badge-edad">0 años</span>
                            </div>

                            <h6 class="fw-bold text-primary mb-3 small border-bottom pb-2 mt-4"><i class="bi bi-envelope-at me-2"></i>CONTACTO Y SEGURIDAD</h6>

                            <div class="row g-2 mb-3">
                                <div class="col-5">
                                    <label class="form-label text-muted small fw-bold">ID Nacional</label>
                                    <input type="text" id="reg-id" class="form-control bg-light" placeholder="Opcional">
                                </div>
                                <div class="col-7">
                                    <label class="form-label text-muted small fw-bold">Teléfono <span class="text-danger">*</span></label>
                                    <input type="tel" id="reg-telefono" class="form-control bg-light" placeholder="Solo números" required>
                                    <div class="invalid-feedback" id="err-telefono">Solo números permitidos.</div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Correo Electrónico <span class="text-danger">*</span></label>
                                <input type="email" id="reg-email" class="form-control bg-light" placeholder="tu@correo.com" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Crear Contraseña <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="password" id="reg-pass" class="form-control border-end-0 bg-light" placeholder="Mínimo 6 caracteres" required>
                                    <span class="input-group-text bg-light cursor-pointer btn-toggle-password" onclick="window.togglePassword('reg-pass', 'icono-ojo-reg-pass')">
                                        <i class="bi bi-eye-slash text-muted" id="icono-ojo-reg-pass"></i>
                                    </span>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">Verificar Contraseña <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="password" id="reg-pass-verify" class="form-control border-end-0 bg-light" placeholder="Repite la contraseña" required>
                                    <span class="input-group-text bg-light cursor-pointer btn-toggle-password" onclick="window.togglePassword('reg-pass-verify', 'icono-ojo-reg-verify')">
                                        <i class="bi bi-eye-slash text-muted" id="icono-ojo-reg-verify"></i>
                                    </span>
                                </div>
                                <div class="invalid-feedback" id="err-pass">Las contraseñas no coinciden.</div>
                            </div>
                            
                            <div id="reg-error" class="alert alert-danger d-none py-2 small fw-bold" role="alert"></div>

                            <button type="submit" id="btn-reg-submit" class="btn btn-success w-100 py-3 fw-bold rounded-pill shadow-sm mb-3 mt-3">
                                CREAR MI CUENTA
                            </button>
                            
                        </form>
                    </div>
                </div>
                
                <button class="btn btn-light w-100 py-3 fw-bold rounded-pill mb-4 shadow-sm" onclick="window.cargarVista('login', 'Login')">
                    <i class="bi bi-arrow-left me-2"></i> Volver al Login
                </button>
            </div>
        </div>
    </template>

    <!-- VISTA: INICIO -->
    <template id="tpl-inicio">
        <div class="row g-3">
            <div class="col-12 mb-2">
                <div class="card app-card bg-primary text-white border-0 shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center p-4">
                        <div>
                            <h5 class="card-title fw-bold mb-1" id="inicio-nombre">Hola, Usuario</h5>
                            <p class="card-text small opacity-75 mb-0">Resumen de tu actividad hoy</p>
                        </div>
                        <i class="bi bi-cloud-check fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>
            
            <div class="col-6">
                <div class="card app-card h-100 cursor-pointer border-0 shadow-sm" onclick="window.location.href='pagos.html'">
                    <div class="card-body text-center d-flex flex-column align-items-center justify-content-center py-4">
                        <div class="text-primary mb-2"><i class="bi bi-credit-card fs-1"></i></div>
                        <h6 class="fw-bold mb-0">Pagos</h6>
                        <small class="text-muted" style="font-size: 0.70rem;">Gestión web</small>
                    </div>
                </div>
            </div>
            
            <div class="col-6">
                <div class="card app-card h-100 cursor-pointer border-0 shadow-sm" onclick="window.location.href='instrucciones.html'">
                    <div class="card-body text-center d-flex flex-column align-items-center justify-content-center py-4">
                        <div class="text-info mb-2"><i class="bi bi-journal-text fs-1"></i></div>
                        <h6 class="fw-bold mb-0">Instrucciones</h6>
                        <small class="text-muted" style="font-size: 0.70rem;">Manual PDF</small>
                    </div>
                </div>
            </div>
            
            <div class="col-6">
                <div class="card app-card h-100 cursor-pointer border-0 shadow-sm" onclick="window.location.href='factura.html'">
                    <div class="card-body text-center d-flex flex-column align-items-center justify-content-center py-4">
                        <div class="text-success mb-2"><i class="bi bi-receipt fs-1"></i></div>
                        <h6 class="fw-bold mb-0">Factura</h6>
                        <small class="text-muted" style="font-size: 0.70rem;">Historial</small>
                    </div>
                </div>
            </div>
            
            <div class="col-6">
                <div class="card app-card h-100 cursor-pointer border-0 shadow-sm" onclick="window.location.href='calendario.html'">
                    <div class="card-body text-center d-flex flex-column align-items-center justify-content-center py-4">
                        <div class="text-warning mb-2"><i class="bi bi-calendar-date fs-1"></i></div>
                        <h6 class="fw-bold mb-0">Calendario</h6>
                        <small class="text-muted" style="font-size: 0.70rem;">Agenda</small>
                    </div>
                </div>
            </div>
        </div>
        
        <div style="height: 100px; width: 100%;"></div>
    </template>

    <!-- VISTA: PERFIL -->
    <template id="tpl-perfil">
        <div id="perfil-flyer" class="bg-primary mx-n3 mt-n3" style="height: 160px; background-size: cover; background-position: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>

        <div class="text-center mb-4" style="margin-top: -60px;">
            <div class="position-relative d-inline-block">
                <div class="bg-primary text-white rounded-circle shadow-sm mb-3 d-flex align-items-center justify-content-center fw-bold overflow-hidden" style="width:120px; height:120px; font-size: 3rem; cursor: pointer; border: 4px solid white;" id="perfil-avatar" onclick="if(window.ImageEditorManager) window.ImageEditorManager.abrirSelectorImagen()">U</div>
                <button class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 end-0 mb-3 me-2 shadow" onclick="if(window.editarMiPerfil) window.editarMiPerfil()">
                    <i class="bi bi-pencil"></i>
                </button>
            </div>
            <h4 class="fw-bold mb-0" id="perfil-nombre">Administrador</h4>
            <p class="text-muted mb-2" id="perfil-email">Cargando...</p>
            <span class="badge bg-primary" id="perfil-rol">Cargando...</span>
        </div>

        <div class="card app-card border-0 mb-3 shadow-sm">
            <div class="card-body p-0">
                <div class="list-group list-group-flush rounded-3">
                    <div class="list-group-item py-3">
                        <small class="text-muted d-block fw-bold mb-1">Teléfono</small>
                        <span id="perfil-telefono">No especificado</span>
                    </div>
                    <div class="list-group-item py-3">
                        <small class="text-muted d-block fw-bold mb-1">Privilegios del Sistema</small>
                        <span class="text-success fw-bold"><i class="bi bi-shield-check me-1"></i> Asignado</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mt-2">
            <div class="col-6">
                <div class="card app-card h-100 cursor-pointer border border-primary border-opacity-25 shadow-sm" onclick="if(window.editarMiPerfil) window.editarMiPerfil()">
                    <div class="card-body text-center d-flex flex-column align-items-center justify-content-center py-4">
                        <div class="text-primary mb-2"><i class="bi bi-person-vcard fs-1"></i></div>
                        <h6 class="fw-bold mb-0">Editar</h6>
                        <small class="text-muted">Mi Perfil</small>
                    </div>
                </div>
            </div>

            <div class="col-6" id="btn-ir-ajustes-container">
                <div class="card app-card h-100 cursor-pointer border border-secondary border-opacity-25 bg-light shadow-sm" id="btn-ir-ajustes" onclick="window.cargarVista('ajustes', 'Ajustes del Sistema')">
                    <div class="card-body text-center d-flex flex-column align-items-center justify-content-center py-4">
                        <div class="text-secondary mb-2"><i class="bi bi-sliders fs-1"></i></div>
                        <h6 class="fw-bold mb-0">Ajustes</h6>
                        <small class="text-muted">Avanzados</small>
                    </div>
                </div>
            </div>
        </div>
        
        <button class="btn btn-outline-danger w-100 py-3 mt-4 fw-bold rounded-pill mb-4 shadow-sm" onclick="window.cerrarSesion()">
            <i class="bi bi-box-arrow-right me-2"></i> CERRAR SESIÓN
        </button>

        <div style="height: 100px; width: 100%;"></div>
    </template>

    <!-- VISTA: AJUSTES (SOLO PARA SUPERUSUARIOS) -->
    <template id="tpl-ajustes">
        <h6 class="fw-bold text-muted mb-3 px-1 small mt-2">SISTEMA Y RENDIMIENTO</h6>
        <div class="row g-3 mb-4">
            
            <div class="col-12">
                 <div class="card app-card h-100 cursor-pointer border-0 shadow-sm border border-primary border-opacity-50" onclick="window.cargarVista('admin_usuarios', 'Usuarios')">
                    <div class="card-body d-flex align-items-center p-3">
                        <div class="bg-primary text-white rounded-circle p-3 me-3 d-flex align-items-center justify-content-center shadow-sm">
                             <i class="bi bi-people-fill fs-4"></i>
                        </div>
                        <div>
                            <h6 class="fw-bold mb-1">Gestión de Usuarios</h6>
                            <small class="text-muted">Agregar, editar o suspender cuentas</small>
                        </div>
                        <i class="bi bi-chevron-right text-muted ms-auto"></i>
                    </div>
                </div>

    <!-- Inicializador principal de la App -->
    <!-- <script src="js/index.js"></script> -->
    <script>
        // Envoltura explícita para la biometría para asegurar que no se pierda al cargar dinámicamente las vistas
        window.ejecutarLoginBiometrico = function() {
            if (typeof window.procesarLoginBiometrico === 'function') {
                window.procesarLoginBiometrico();
            } else {
                 window.mostrarNotificacion('Biometría no disponible o en carga', 'warning');
            }
        };

        // Lógica de "Volver Atrás" Global Segura
        window.irAtrasGlobal = function() {
            const title = document.getElementById('view-title')?.innerText.toLowerCase() || '';
            // Si el usuario está editando perfil, vuelve al Perfil
            if (title.includes('edit')) {
                window.cargarVista('perfil', 'Mi Perfil');
            } 
            // Si el usuario estaba viendo la tabla de usuarios, vuelve a Ajustes
            else if (title.includes('usuarios')) {
                window.cargarVista('ajustes', 'Ajustes del Sistema');
            } 
            // Por defecto, cualquier otra vista interna (Pagos, Factura, etc.) vuelve a Inicio
            else {
                window.cargarVista('inicio', 'Inicio');
            }
        };

        // Observador para mostrar u ocultar el botón "Atrás" automáticamente
        document.addEventListener('DOMContentLoaded', () => {
            const titleNode = document.getElementById('view-title');
            const backBtn = document.getElementById('btn-global-back');
            
            if (titleNode && backBtn) {
                const observer = new MutationObserver(() => {
                    const title = titleNode.innerText.toLowerCase();
                    // Ocultar botón en las pantallas raíz (Inicio, Login, Registro, Mi Perfil)
                    if (title === 'inicio' || title === 'login' || title === 'mi perfil' || title === 'registro') {
                        backBtn.classList.add('d-none');
                    } else {
                        backBtn.classList.remove('d-none');
                    }
                });
                // Iniciar la observación de los cambios en el título
                observer.observe(titleNode, { childList: true, characterData: true, subtree: true });
            }
        });
    </script>

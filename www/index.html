<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d6efd">
    
    <!-- CSP CRÍTICO 100% LOCAL (0% CDNs) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor://localhost http://localhost data: gap: https://kenth1977.pythonanywhere.com http://127.0.0.1:5000; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://kenth1977.pythonanywhere.com capacitor://localhost http://localhost http://127.0.0.1:5000; font-src 'self' data:;">
    
    <title>Motor Universal App</title>
    
    <!-- ESTILOS SEPARADOS LOCALES -->
    <link href="css/main.css" rel="stylesheet">
</head>
<body>

    <!-- ==========================================
         CASCARÓN DE LA APP (SHELL)
    =========================================== -->

    <!-- BARRA SUPERIOR -->
    <nav class="navbar navbar-dark bg-primary top-navbar d-none" id="app-header">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <span class="navbar-brand mb-0 h1 fw-bold" id="view-title">Inicio</span>
        </div>
    </nav>

    <!-- CONTENEDOR DINÁMICO -->
    <div id="app-root" class="container-fluid pt-safe fade-in">
        <div class="d-flex flex-column justify-content-center align-items-center h-100" style="min-height: 80vh;">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted fw-bold small" id="loading-text">Conectando Motor SQLite...</p>
        </div>
    </div>

    <!-- BARRA DE NAVEGACIÓN INFERIOR -->
    <nav class="bottom-nav d-none justify-content-around" id="app-bottom-nav">
        <div class="nav-item text-center active" id="nav-inicio" onclick="window.cargarVista('inicio', 'Inicio')">
            <i class="bi bi-house-fill fs-4"></i>
            <span>Inicio</span>
        </div>
        <div class="nav-item text-center text-secondary" id="nav-admin_usuarios" onclick="window.cargarVista('admin_usuarios', 'Usuarios')">
            <i class="bi bi-people-fill fs-4"></i>
            <span>Usuarios</span>
        </div>
        <div class="nav-item text-center text-secondary" id="nav-perfil" onclick="window.cargarVista('perfil', 'Mi Perfil')">
            <i class="bi bi-person-circle fs-4"></i>
            <span>Perfil</span>
        </div>
        <div class="nav-item text-center text-secondary" id="nav-ajustes" onclick="window.cargarVista('ajustes', 'Ajustes')">
            <i class="bi bi-gear-fill fs-4"></i>
            <span>Ajustes</span>
        </div>
    </nav>

    <!-- TOAST DE NOTIFICACIONES NATIVAS -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050; margin-top: 60px;">
        <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header text-white" id="toast-header">
                <i class="bi bi-info-circle me-2"></i>
                <strong class="me-auto" id="toast-title">Notificación</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body bg-white fw-medium" id="toast-message"></div>
        </div>
    </div>

    <!-- MODAL DE RESETEO PROFUNDO (3 PASOS) -->
    <div class="modal fade" id="modalResetDB" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-body text-center p-4 pb-2" id="reset-db-body">
                    <!-- JS inyecta dinámicamente -->
                </div>
                <div class="modal-footer d-flex justify-content-center border-0 pt-0 pb-4 gap-2" id="reset-db-footer">
                    <!-- JS inyecta dinámicamente -->
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         VISTAS DE LA APP (FRAGMENTOS)
    =========================================== -->

    <!-- VISTA: LOGIN -->
    <template id="tpl-login">
        <div class="row justify-content-center align-items-center" style="min-height: 80vh; padding-bottom: 50px;">
            <div class="col-12 col-md-8 col-lg-6 text-center">
                <div class="mb-4 mt-4">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center shadow" style="width: 80px; height: 80px;">
                        <i class="bi bi-rocket-takeoff fs-1"></i>
                    </div>
                    <h2 class="mt-3 fw-bold text-dark">Bienvenido de nuevo</h2>
                    <p class="text-muted">Ingresa tus credenciales para acceder</p>
                </div>

                <div class="card app-card text-start border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form id="form-login" onsubmit="event.preventDefault(); window.iniciarSesionApp();">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" id="login-email" class="form-control border-start-0 ps-0 bg-light" placeholder="tu@correo.com" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" id="login-pass" class="form-control border-start-0 border-end-0 ps-0 bg-light" placeholder="••••••••" required>
                                    <span class="input-group-text bg-light border-start-0 cursor-pointer" onclick="window.RegistroManager.togglePasswordVisibility('login-pass', this)">
                                        <i class="bi bi-eye-slash text-muted"></i>
                                    </span>
                                </div>
                            </div>
                            
                            <div id="login-error" class="alert alert-danger d-none py-2 small fw-bold" role="alert"></div>

                            <button type="submit" id="btn-login-submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm mb-3 mt-2">
                                INGRESAR AL SISTEMA
                            </button>
                            <button type="button" id="btn-bio-login" class="btn btn-outline-secondary w-100 py-2 fw-bold rounded-pill" onclick="window.mostrarNotificacion('Biometría en desarrollo', 'primary');">
                                <i class="bi bi-fingerprint fs-5 me-2 align-middle"></i> Acceso Biométrico
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="mt-4 pt-3 border-top">
                    <p class="text-muted small mb-1">¿Aún no eres parte de la plataforma?</p>
                    <button class="btn btn-link text-primary fw-bold text-decoration-none p-0" onclick="window.cargarVista('registro', 'Registro')">Crear una cuenta nueva</button>
                    <!-- EL BOTON DE FORMATEAR FUE ELIMINADO DE AQUI POR SEGURIDAD -->
                </div>
            </div>
        </div>
    </template>

    <!-- VISTA: REGISTRO -->
    <template id="tpl-registro">
        <div class="row justify-content-center align-items-center pb-5">
            <div class="col-12 col-md-8 col-lg-6 text-center">
                <div class="mb-4 mt-3">
                    <h2 class="fw-bold text-dark mb-1">Crear Cuenta</h2>
                    <p class="text-muted small">Completa tus datos reales para unirte</p>
                </div>

                <div class="card app-card text-start border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <form id="form-registro" onsubmit="event.preventDefault(); window.RegistroManager.procesarRegistro();">
                            
                            <h6 class="fw-bold text-primary mb-3 small border-bottom pb-2"><i class="bi bi-person-lines-fill me-2"></i>DATOS PERSONALES</h6>
                            
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Nombre(s) <span class="text-danger">*</span></label>
                                <input type="text" id="reg-nombre" class="form-control bg-light" placeholder="Ej: Juan Carlos" required>
                                <div class="invalid-feedback" id="err-nombre">Solo letras. Máx 1 espacio. Primera letra mayúscula.</div>
                            </div>

                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <label class="form-label text-muted small fw-bold">1er Apellido <span class="text-danger">*</span></label>
                                    <input type="text" id="reg-apellido1" class="form-control bg-light" placeholder="Ej: Perez" required>
                                    <div class="invalid-feedback" id="err-apellido1">Sin espacios ni números.</div>
                                </div>
                                <div class="col-6">
                                    <label class="form-label text-muted small fw-bold">2do Apellido</label>
                                    <input type="text" id="reg-apellido2" class="form-control bg-light" placeholder="Opcional">
                                    <div class="invalid-feedback" id="err-apellido2">Sin espacios ni números.</div>
                                </div>
                            </div>

                            <label class="form-label text-muted small fw-bold mb-1">Fecha de Nacimiento <span class="text-danger">*</span></label>
                            <div class="row g-2 mb-1">
                                <div class="col-3">
                                    <input type="number" id="reg-dia" class="form-control bg-light text-center" placeholder="DD" min="1" max="31" required>
                                </div>
                                <div class="col-5">
                                    <select id="reg-mes" class="form-select bg-light" required>
                                        <option value="" selected disabled>Mes</option>
                                        <option value="01">Ene</option>
                                        <option value="02">Feb</option>
                                        <option value="03">Mar</option>
                                        <option value="04">Abr</option>
                                        <option value="05">May</option>
                                        <option value="06">Jun</option>
                                        <option value="07">Jul</option>
                                        <option value="08">Ago</option>
                                        <option value="09">Sep</option>
                                        <option value="10">Oct</option>
                                        <option value="11">Nov</option>
                                        <option value="12">Dic</option>
                                    </select>
                                </div>
                                <div class="col-4">
                                    <input type="number" id="reg-anio" class="form-control bg-light text-center" placeholder="AAAA" min="1900" max="2026" required>
                                </div>
                            </div>
                            <div class="mb-4 d-flex justify-content-between align-items-center px-1">
                                <small class="text-danger d-none" id="err-fecha">Fecha inválida.</small>
                                <span class="badge bg-secondary rounded-pill d-none px-3" id="badge-edad">0 años</span>
                            </div>

                            <h6 class="fw-bold text-primary mb-3 small border-bottom pb-2 mt-4"><i class="bi bi-envelope-at me-2"></i>CONTACTO Y SEGURIDAD</h6>

                            <div class="row g-2 mb-3">
                                <div class="col-5">
                                    <label class="form-label text-muted small fw-bold">ID Nacional</label>
                                    <input type="text" id="reg-id" class="form-control bg-light" placeholder="Opcional">
                                </div>
                                <div class="col-7">
                                    <label class="form-label text-muted small fw-bold">Teléfono <span class="text-danger">*</span></label>
                                    <input type="tel" id="reg-telefono" class="form-control bg-light" placeholder="Solo números" required>
                                    <div class="invalid-feedback" id="err-telefono">Solo números permitidos.</div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Correo Electrónico <span class="text-danger">*</span></label>
                                <input type="email" id="reg-email" class="form-control bg-light" placeholder="tu@correo.com" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">Crear Contraseña <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="password" id="reg-pass" class="form-control border-end-0 bg-light" placeholder="Mínimo 6 caracteres" required>
                                    <span class="input-group-text bg-light cursor-pointer" onclick="window.RegistroManager.togglePasswordVisibility('reg-pass', this)">
                                        <i class="bi bi-eye-slash text-muted"></i>
                                    </span>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">Verificar Contraseña <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="password" id="reg-pass-verify" class="form-control border-end-0 bg-light" placeholder="Repite la contraseña" required>
                                    <span class="input-group-text bg-light cursor-pointer" onclick="window.RegistroManager.togglePasswordVisibility('reg-pass-verify', this)">
                                        <i class="bi bi-eye-slash text-muted"></i>
                                    </span>
                                </div>
                                <div class="invalid-feedback" id="err-pass">Las contraseñas no coinciden.</div>
                            </div>
                            
                            <div id="reg-error" class="alert alert-danger d-none py-2 small fw-bold" role="alert"></div>

                            <button type="submit" id="btn-reg-submit" class="btn btn-success w-100 py-3 fw-bold rounded-pill shadow-sm mb-3 mt-3">
                                CREAR MI CUENTA
                            </button>
                            
                        </form>
                    </div>
                </div>
                
                <button class="btn btn-light w-100 py-3 fw-bold rounded-pill mb-4 shadow-sm" onclick="window.cargarVista('login', 'Login')">
                    <i class="bi bi-arrow-left me-2"></i> Volver al Login
                </button>
            </div>
        </div>
    </template>

    <!-- VISTA: INICIO -->
    <template id="tpl-inicio">
        <div class="row g-3">
            <div class="col-12 mb-2">
                <div class="card app-card bg-primary text-white">
                    <div class="card-body d-flex justify-content-between align-items-center p-4">
                        <div>
                            <h5 class="card-title fw-bold mb-1" id="inicio-nombre">Hola, Usuario</h5>
                            <p class="card-text small opacity-75 mb-0">Resumen de tu actividad hoy</p>
                        </div>
                        <i class="bi bi-cloud-check fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>

            <div class="col-6">
                <div class="card app-card h-100" onclick="window.mostrarNotificacion('Sincronizando con la nube...', 'info')">
                    <div class="card-body text-center">
                        <div class="text-primary mb-2"><i class="bi bi-arrow-repeat fs-1"></i></div>
                        <h6 class="fw-bold mb-0">Sincronizar</h6>
                        <small class="text-muted">Datos globales</small>
                    </div>
                </div>
            </div>
            
            <div class="col-6">
                <div class="card app-card h-100">
                    <div class="card-body text-center">
                        <div class="text-success mb-2"><i class="bi bi-check-circle fs-1"></i></div>
                        <h6 class="fw-bold mb-0">Estado DB</h6>
                        <small class="text-muted">Local OK</small>
                    </div>
                </div>
            </div>

            <div class="col-12 mt-4">
                <h6 class="fw-bold text-muted mb-3 px-1">ACCESOS RÁPIDOS</h6>
                <div class="list-group list-group-flush rounded-3 shadow-sm bg-white app-card">
                    <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3 border-bottom" onclick="window.cargarVista('admin_usuarios', 'Usuarios')">
                        <div class="d-flex align-items-center">
                            <div class="bg-light rounded p-2 me-3 text-primary"><i class="bi bi-people"></i></div>
                            <span class="fw-medium">Gestión de Usuarios</span>
                        </div>
                        <i class="bi bi-chevron-right text-muted"></i>
                    </button>
                    <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3" onclick="window.cargarVista('ajustes', 'Ajustes')">
                        <div class="d-flex align-items-center">
                            <div class="bg-light rounded p-2 me-3 text-secondary"><i class="bi bi-sliders"></i></div>
                            <span class="fw-medium">Configuración del Sistema</span>
                        </div>
                        <i class="bi bi-chevron-right text-muted"></i>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- VISTA: PERFIL -->
    <template id="tpl-perfil">
        <div class="text-center mb-4 mt-3">
            <div class="position-relative d-inline-block">
                <div class="bg-primary text-white rounded-circle shadow-sm mb-3 d-flex align-items-center justify-content-center fw-bold overflow-hidden" style="width:120px; height:120px; font-size: 3rem; cursor: pointer;" id="perfil-avatar" onclick="window.ImageEditorManager.abrirSelectorImagen()">U</div>
                <button class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 end-0 mb-3 me-2 shadow" onclick="window.editarMiPerfil()">
                    <i class="bi bi-pencil"></i>
                </button>
            </div>
            <h4 class="fw-bold mb-0" id="perfil-nombre">Administrador</h4>
            <p class="text-muted mb-2" id="perfil-email">Cargando...</p>
            <span class="badge bg-primary" id="perfil-rol">Cargando...</span>
        </div>

        <div class="card app-card border-0">
            <div class="card-body p-0">
                <div class="list-group list-group-flush rounded-3">
                    <div class="list-group-item py-3">
                        <small class="text-muted d-block fw-bold mb-1">Teléfono</small>
                        <span id="perfil-telefono">No especificado</span>
                    </div>
                    <div class="list-group-item py-3">
                        <small class="text-muted d-block fw-bold mb-1">Privilegios del Sistema</small>
                        <span class="text-success fw-bold"><i class="bi bi-shield-check me-1"></i> Asignado</span>
                    </div>
                </div>
            </div>
        </div>
        <button class="btn btn-outline-primary w-100 mt-4 rounded-pill fw-bold shadow-sm" onclick="window.editarMiPerfil()"><i class="bi bi-sliders me-1"></i> Editar Información</button>
        
        <!-- FIX: Espaciador invisible para que la barra inferior no tape el botón -->
        <div style="height: 100px; width: 100%;"></div>
    </template>

    <!-- VISTA: ADMIN USUARIOS -->
    <template id="tpl-admin_usuarios">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                <input type="text" id="buscador-usuarios" class="form-control border-start-0 ps-0" placeholder="Buscar usuario en DB...">
            </div>
            <button class="btn btn-primary ms-2 rounded-circle shadow-sm" style="width: 40px; height: 40px; flex-shrink: 0;"><i class="bi bi-plus-lg"></i></button>
        </div>

        <div class="card app-card border-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3 border-0 rounded-top-start">Usuario</th>
                            <th class="border-0 text-center">Estado</th>
                            <th class="text-end pe-3 border-0 rounded-top-end">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="lista-usuarios-admin">
                        <!-- LA BASE DE DATOS LLENARÁ ESTO DINÁMICAMENTE -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- FIX: Espaciador invisible para la tabla -->
        <div style="height: 100px; width: 100%;"></div>
    </template>

    <!-- VISTA: EDITAR USUARIO -->
    <template id="tpl-editar_usuario">
        <div class="card app-card border-0 mt-2 mb-4">
            <div class="card-body p-4">
                <div class="text-center mb-4 pb-3 border-bottom">
                    <div class="position-relative d-inline-block">
                        <div class="bg-primary text-white rounded-circle shadow-sm mb-2 d-flex align-items-center justify-content-center fw-bold overflow-hidden" style="width:100px; height:100px; font-size: 2.5rem; cursor: pointer; margin: 0 auto;" id="edit-avatar" onclick="window.ImageEditorManager.abrirSelectorImagen()">U</div>
                        <button class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 end-0 mb-2 shadow" style="transform: translate(25%, 25%);" onclick="window.ImageEditorManager.abrirSelectorImagen()">
                            <i class="bi bi-camera-fill"></i>
                        </button>
                    </div>
                    <h6 class="mb-0 fw-bold text-dark mt-2" id="edit-email-display">usuario@correo.com</h6>
                    <small class="text-muted">Editor de Perfil Completo</small>
                </div>

                <form onsubmit="event.preventDefault(); window.guardarEdicionUsuario();">
                    
                    <h6 class="fw-bold text-primary mb-3 small border-bottom pb-2"><i class="bi bi-person-lines-fill me-2"></i>DATOS PERSONALES</h6>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Nombre Completo <span class="text-danger">*</span></label>
                        <input type="text" id="edit-nombre" class="form-control bg-light" placeholder="Ej: Juan Carlos Perez" required>
                        <small class="text-muted" style="font-size: 0.70rem;">Separe nombres y apellidos por espacios</small>
                    </div>

                    <label class="form-label text-muted small fw-bold mb-1">Fecha de Nacimiento <span class="text-danger">*</span></label>
                    <div class="row g-2 mb-3">
                        <div class="col-3">
                            <input type="number" id="edit-dia" class="form-control bg-light text-center" placeholder="DD" min="1" max="31" required>
                        </div>
                        <div class="col-5">
                            <select id="edit-mes" class="form-select bg-light" required>
                                <option value="" selected disabled>Mes</option>
                                <option value="01">Ene</option>
                                <option value="02">Feb</option>
                                <option value="03">Mar</option>
                                <option value="04">Abr</option>
                                <option value="05">May</option>
                                <option value="06">Jun</option>
                                <option value="07">Jul</option>
                                <option value="08">Ago</option>
                                <option value="09">Sep</option>
                                <option value="10">Oct</option>
                                <option value="11">Nov</option>
                                <option value="12">Dic</option>
                            </select>
                        </div>
                        <div class="col-4">
                            <input type="number" id="edit-anio" class="form-control bg-light text-center" placeholder="AAAA" min="1900" max="2026" required>
                        </div>
                    </div>

                    <h6 class="fw-bold text-primary mb-3 small border-bottom pb-2 mt-4"><i class="bi bi-envelope-at me-2"></i>CONTACTO Y SEGURIDAD</h6>

                    <div class="row g-2 mb-3">
                        <div class="col-5">
                            <label class="form-label text-muted small fw-bold">ID Nacional</label>
                            <input type="text" id="edit-id_nacional" class="form-control bg-light" placeholder="Opcional">
                        </div>
                        <div class="col-7">
                            <label class="form-label text-muted small fw-bold">Teléfono</label>
                            <input type="tel" id="edit-telefono" class="form-control bg-light" placeholder="Ej: 88888888">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Correo Electrónico (No editable)</label>
                        <input type="email" id="edit-email" class="form-control bg-light" readonly>
                        <small class="text-muted" style="font-size: 0.70rem;">El correo electrónico es el identificador único y no puede cambiarse.</small>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Contraseña de acceso</label>
                        <div class="input-group">
                            <input type="password" id="edit-password" class="form-control border-end-0 bg-light" required>
                            <span class="input-group-text bg-light cursor-pointer border-start-0" onclick="window.RegistroManager.togglePasswordVisibility('edit-password', this)">
                                <i class="bi bi-eye-slash text-muted"></i>
                            </span>
                        </div>
                        <small class="text-muted" style="font-size: 0.70rem;">Se encuentra encriptada. Escriba una nueva si desea cambiarla.</small>
                    </div>

                    <div id="box-privilegios" class="p-3 mb-4 rounded-3 border bg-light">
                        <h6 class="fw-bold mb-3 small text-primary"><i class="bi bi-shield-lock me-1"></i> ZONA ADMINISTRATIVA</h6>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Rol en el sistema</label>
                            <select id="edit-rol" class="form-select border-0 py-2">
                                <option value="usuario">Usuario Regular</option>
                                <option value="admin">Administrador</option>
                                <option value="superusuario">Superusuario</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label text-muted small fw-bold">Estado de cuenta</label>
                            <select id="edit-estado" class="form-select border-0 py-2">
                                <option value="activo">Activa (Permitir acceso)</option>
                                <option value="inactivo">Inactiva (Bloqueado)</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" id="btn-save-edit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm mb-3">
                        <i class="bi bi-check2-circle me-1"></i> GUARDAR CAMBIOS
                    </button>
                    <button type="button" class="btn btn-outline-secondary w-100 py-2 fw-bold rounded-pill" onclick="window.cancelarEdicion()">
                        CANCELAR
                    </button>
                    
                    <div style="height: 100px; width: 100%;"></div>
                </form>
            </div>
        </div>
    </template>

    <!-- VISTA: AJUSTES -->
    <template id="tpl-ajustes">
        <h6 class="fw-bold text-muted mb-3 px-1 mt-2 small">PREFERENCIAS DE LA APP</h6>
        <div class="card app-card mb-4 border-0">
            <div class="list-group list-group-flush rounded-3">
                <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-moon fs-5 me-3 text-muted"></i>
                        <span class="fw-medium">Modo Oscuro</span>
                    </div>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input fs-5" type="checkbox" role="switch" id="switch-modo-oscuro">
                    </div>
                </div>
                <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-bell fs-5 me-3 text-muted"></i>
                        <span class="fw-medium">Notificaciones Push</span>
                    </div>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input fs-5" type="checkbox" role="switch" checked>
                    </div>
                </div>
            </div>
        </div>

        <h6 class="fw-bold text-muted mb-3 px-1 small">SISTEMA Y RENDIMIENTO</h6>
        <div class="card app-card mb-4 border-0">
            <div class="list-group list-group-flush rounded-3">
                <button class="list-group-item list-group-item-action py-3 text-primary d-flex align-items-center" onclick="window.sqliteService.testConnection()">
                    <i class="bi bi-speedometer2 fs-5 me-3"></i> 
                    <span class="fw-medium">Test de Rendimiento SQLite</span>
                </button>
            </div>
        </div>

        <!-- ZONA ADMINISTRATIVA DE DATOS (Solo visible para Superusuarios a través del script adminDb.js) -->
        <div id="admin-db-controls" class="d-none mb-4">
            <h6 class="fw-bold text-danger mb-3 px-1 small"><i class="bi bi-shield-lock-fill me-1"></i> ZONA ADMINISTRATIVA DE DATOS</h6>
            <div class="card app-card border-0 border border-danger border-opacity-25">
                <div class="list-group list-group-flush rounded-3">
                    
                    <!-- EXPORTACIONES SIMPLES (JSON) -->
                    <button class="list-group-item list-group-item-action py-3 text-primary d-flex align-items-center" onclick="window.AdminDBManager.respaldarBD()">
                        <i class="bi bi-filetype-json fs-5 me-3"></i> 
                        <span class="fw-medium">Exportar Usuarios (JSON)</span>
                    </button>
                    <label class="list-group-item list-group-item-action py-3 text-success d-flex align-items-center mb-0 cursor-pointer" style="margin: 0; border-bottom: 1px solid rgba(0,0,0,0.125);">
                        <i class="bi bi-file-earmark-arrow-up fs-5 me-3"></i> 
                        <span class="fw-medium">Importar Usuarios (JSON)</span>
                        <input type="file" accept=".json" class="d-none" onchange="window.AdminDBManager.cargarBD(event)">
                    </label>

                    <!-- EXPORTACIONES COMPLETAS (.DB OFUSCADO) -->
                    <button class="list-group-item list-group-item-action py-3 text-primary fw-bold d-flex align-items-center bg-light" onclick="window.AdminDBManager.respaldarBDCompleta()">
                        <i class="bi bi-database-down fs-5 me-3"></i> 
                        <span class="fw-medium">Respaldo Completo (.db)</span>
                    </button>
                    <label class="list-group-item list-group-item-action py-3 text-success fw-bold d-flex align-items-center mb-0 cursor-pointer bg-light" style="margin: 0; border-bottom: 1px solid rgba(0,0,0,0.125);">
                        <i class="bi bi-database-up fs-5 me-3"></i> 
                        <span class="fw-medium">Restaurar Completo (.db)</span>
                        <input type="file" accept=".db" class="d-none" onchange="window.AdminDBManager.cargarBDCompleta(event)">
                    </label>

                    <!-- RESETEO FATAL -->
                    <button class="list-group-item list-group-item-action py-3 text-danger d-flex align-items-center" onclick="window.AdminDBManager.iniciarReseteo()">
                        <i class="bi bi-exclamation-triangle fs-5 me-3"></i> 
                        <span class="fw-medium fw-bold">Resetear Base de Datos</span>
                    </button>
                </div>
            </div>
        </div>

        <button class="btn btn-outline-danger w-100 py-3 fw-bold rounded-pill mb-4 shadow-sm" onclick="window.cerrarSesion()">
            <i class="bi bi-box-arrow-right me-2"></i> CERRAR SESIÓN
        </button>
        
        <div style="height: 100px; width: 100%;"></div>
    </template>

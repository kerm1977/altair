<!-- ============================================================================== -->
<!-- ARCHIVO: index.html (APP SHELL MAESTRO SPA)                                    -->
<!-- DESCRIPCIÓN: Contenedor global. Gestiona CSS, Navegación, Auth y Módulos.      -->
<!-- ============================================================================== -->
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>La Tribu - App</title>
    
    <!-- Evitar error 404 de favicon -->
    <link rel="icon" href="data:,">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* ==========================================
           🎨 VARIABLES DE TEMA Y GLASSMORPHISM
           ========================================== */
        :root {
            /* Tema Light */
            --bg-gradient: linear-gradient(135deg, #fdfbf7 0%, #f0ebe1 100%);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: rgba(0, 0, 0, 0.05);
            --text-primary: #2c2b2a;
            --text-secondary: #6c6a66;
            --input-bg: rgba(255, 255, 255, 0.8);
            --modal-backdrop-bg: rgba(255, 255, 255, 0.3);
        }

        [data-bs-theme="dark"] {
            /* Tema Dark */
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --glass-bg: rgba(18, 20, 24, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --input-bg: rgba(0, 0, 0, 0.25);
            --modal-backdrop-bg: rgba(0, 0, 0, 0.5);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background-attachment: fixed;
            transition: background 0.5s ease, color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        /* 🪟 EFECTO CRISTAL (GLASSMORPHISM) */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px 0 var(--glass-shadow);
            transition: all 0.3s ease;
        }

        /* Modales de Bootstrap ajustados al Glassmorphism */
        .modal-backdrop.show {
            opacity: 1 !important;
            background-color: var(--modal-backdrop-bg) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* ✍️ INPUTS MINIMALISTAS LIMPIOS */
        .input-group-glass {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 1rem; 
            display: flex;
            align-items: stretch;
            transition: all 0.3s ease;
            overflow: hidden; 
        }
        .input-group-glass:focus-within {
            border-color: #0dcaf0;
            box-shadow: 0 0 0 4px rgba(13, 202, 240, 0.15);
            background: var(--glass-bg);
        }
        .icon-box-glass {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0 0.5rem 0 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
        }
        .icon-btn-glass {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0 1.25rem 0 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .icon-btn-glass:hover {
            color: var(--text-primary);
        }
        .form-control-glass {
            background: transparent !important;
            border: none !important;
            color: var(--text-primary) !important;
            padding: 0.85rem 1rem 0.85rem 0.5rem; 
            font-size: 1rem;
            box-shadow: none !important;
            flex-grow: 1;
            min-width: 0; 
        }
        .form-control-glass::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* Utilidades Generales */
        .text-themed { color: var(--text-primary) !important; }
        .text-muted-themed { color: var(--text-secondary) !important; }
        .cursor-pointer { cursor: pointer; }
        .avatar-upload-container:hover .avatar-upload-overlay { opacity: 1 !important; }

        /* Botón Disimulado hacia Dashboard */
        .btn-disimulado {
            opacity: 0.15;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 9999;
        }
        .btn-disimulado:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* Contenedor SPA */
        #app-root {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Animación de Vistas */
        .fade-view {
            animation: fadeIn 0.4s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<!-- Padding inferior para que la barra de navegación no tape el contenido -->
<body class="pb-5 mb-4">

    <!-- ============================================================================== -->
    <!-- BOTÓN DE TEMA (Flotante) -->
    <!-- ============================================================================== -->
    <div class="position-absolute top-0 end-0 p-3" style="z-index: 1000;">
        <button class="btn glass-panel border-0 rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 45px; height: 45px;" id="btnThemeToggle" title="Cambiar Tema">
            <i class="bi bi-sun-fill fs-5" id="themeIcon" style="color: #ffc107;"></i>
        </button>
    </div>

    <!-- ============================================================================== -->
    <!-- CONTENEDOR CENTRAL DE LA APP -->
    <!-- ============================================================================== -->
    <main id="app-root" class="w-100">
        
        <!-- ============================================================================== -->
        <!-- VISTA 1: INICIO DE SESIÓN (LOGIN) -->
        <!-- ============================================================================== -->
        <div id="vista-login" class="w-100 fade-view" style="max-width: 420px;">
            <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center shadow" style="width: 70px; height: 70px;">
                    <i class="bi bi-fingerprint fs-1"></i>
                </div>
                <h2 class="fw-bold text-themed mt-3 mb-0">La Tribu</h2>
                <p class="text-muted-themed">Bienvenido de vuelta</p>
            </div>

            <div class="glass-panel p-4 p-md-5">
                <form id="loginForm">
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-muted-themed small px-2 mb-1">Correo Electrónico</label>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-envelope"></i></div>
                            <input type="email" id="loginEmail" class="form-control-glass" placeholder="usuario@correo.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1 px-2">
                            <label class="form-label fw-semibold text-muted-themed small m-0">Contraseña</label>
                            <a href="#" class="text-info small text-decoration-none fw-semibold" onclick="cambiarVista('recuperacion')">¿Olvidaste?</a>
                        </div>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-lock"></i></div>
                            <input type="password" id="loginPass" class="form-control-glass" placeholder="Máx 15 carac." maxlength="15" required>
                            <div class="icon-btn-glass" onclick="typeof togglePassword === 'function' ? togglePassword('loginPass', 'iconLoginPass') : null">
                                <i class="bi bi-eye" id="iconLoginPass"></i>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                        <div class="form-check">
                            <input class="form-check-input border-secondary" type="checkbox" id="rememberMe">
                            <label class="form-check-label small text-muted-themed fw-semibold" for="rememberMe" style="cursor: pointer;">
                                Recordar mi correo
                            </label>
                        </div>
                    </div>

                    <button type="button" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow mt-2" onclick="loginUsuario()">
                        Ingresar <i class="bi bi-arrow-right ms-2"></i>
                    </button>

                    <div class="text-center mt-4 pt-4 border-top border-secondary border-opacity-25">
                        <span class="text-muted-themed small">¿No tienes cuenta? <a href="#" class="text-info fw-bold text-decoration-none ms-1 cursor-pointer" onclick="cambiarVista('registro')">Crear Cuenta</a></span>
                    </div>
                </form>
            </div>
        </div>

        <!-- ============================================================================== -->
        <!-- VISTA 2: REGISTRO VIP (CON COLD STORAGE ENCRIPTADO) -->
        <!-- ============================================================================== -->
        <div id="vista-registro" class="w-100 d-none fade-view my-4" style="max-width: 650px;">
            <div class="glass-panel p-4 p-md-5 shadow-lg">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-themed mb-4"><i class="bi bi-person-badge text-primary me-2"></i>Únete a La Tribu</h2>
                    
                    <div class="position-relative d-inline-block avatar-upload-container cursor-pointer" onclick="document.getElementById('inputAvatarFile').click()">
                        <img id="formAvatarPreview" src="https://ui-avatars.com/api/?name=Nuevo+Usuario&background=random" class="rounded-circle shadow-lg border border-4 border-secondary border-opacity-25" width="130" height="130" style="object-fit: cover; transition: all 0.3s;">
                        <div class="avatar-upload-overlay position-absolute top-0 start-0 w-100 h-100 rounded-circle bg-dark bg-opacity-50 d-flex justify-content-center align-items-center" style="opacity: 0; transition: opacity 0.2s;">
                            <i class="bi bi-camera-fill text-white fs-3"></i>
                        </div>
                        <input type="file" id="inputAvatarFile" class="d-none" accept="image/*" onchange="typeof previsualizarAvatar === 'function' && previsualizarAvatar(event, 'formAvatarPreview')">
                    </div>
                    <div class="small fw-semibold text-muted-themed mt-2">Toque para añadir su foto</div>
                </div>

                <form id="formRegistro" class="text-start mt-4">
                    
                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Nombres</label>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-person"></i></div>
                            <input type="text" class="form-control-glass fw-semibold" id="regNombres" placeholder="Ej. Juan Carlos" required oninput="typeof validarNombres==='function'&&validarNombres(this)" onblur="typeof trimEspacios==='function'&&trimEspacios(this)">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Primer Apellido</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-person-lines-fill"></i></div>
                                <input type="text" class="form-control-glass fw-semibold" id="regApellido1" placeholder="Ej. Pérez" required oninput="typeof validarApellidos==='function'&&validarApellidos(this)" onblur="typeof trimEspacios==='function'&&trimEspacios(this)">
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Segundo Apellido</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-person-lines-fill"></i></div>
                                <input type="text" class="form-control-glass fw-semibold" id="regApellido2" placeholder="Ej. Silva (Opcional)" oninput="typeof validarApellidos==='function'&&validarApellidos(this)" onblur="typeof trimEspacios==='function'&&trimEspacios(this)">
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Correo Electrónico</label>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-envelope"></i></div>
                            <input type="email" class="form-control-glass fw-semibold" id="regEmail" placeholder="correo@ejemplo.com" required>
                        </div>
                    </div>

                    <!-- DATOS COLD STORAGE -->
                    <div class="row g-3 mb-4 p-3 rounded-4 border border-warning border-opacity-50" style="background-color: rgba(255, 193, 7, 0.05);">
                        <p class="text-warning small fw-bold mb-0 text-center w-100"><i class="bi bi-shield-lock-fill me-1"></i> Datos para Llave de Recuperación</p>
                        <div class="col-12 col-md-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Celular</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-telephone text-warning"></i></div>
                                <input type="text" class="form-control-glass fw-bold" id="regTelefono" placeholder="12345678" maxlength="8" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 8)" required>
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">PIN (6 carac.)</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-123 text-warning"></i></div>
                                <input type="text" class="form-control-glass fw-bold text-uppercase" id="regPin" placeholder="AB1234" maxlength="6" style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase()" required>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-5">
                        <div class="col-12 col-md-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Crear Contraseña</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-key"></i></div>
                                <input type="password" class="form-control-glass" id="regPass" placeholder="De 8 a 15 carac." maxlength="15" minlength="8" required>
                                <div class="icon-btn-glass" onclick="typeof togglePassword === 'function' ? togglePassword('regPass', 'iconRegPass1') : null"><i class="bi bi-eye" id="iconRegPass1"></i></div>
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Confirmar Contraseña</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-shield-lock-fill"></i></div>
                                <input type="password" class="form-control-glass" id="regPassConf" placeholder="Repita contraseña" maxlength="15" minlength="8" required>
                                <div class="icon-btn-glass" onclick="typeof togglePassword === 'function' ? togglePassword('regPassConf', 'iconRegPass2') : null"><i class="bi bi-eye" id="iconRegPass2"></i></div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 pt-3 border-top border-secondary border-opacity-25">
                        <button type="button" class="btn btn-outline-secondary rounded-pill fw-bold shadow-sm py-3 px-4 w-100" onclick="cambiarVista('login')">
                            <i class="bi bi-arrow-left me-1"></i> Volver al Login
                        </button>
                        <button type="button" id="btnGuardarRegistro" class="btn btn-primary rounded-pill fw-bold shadow-sm py-3 px-4 w-100" onclick="registrarUsuario()">
                            Crear Cuenta y Llave <i class="bi bi-stars ms-1"></i>
                        </button>
                    </div>

                </form>
            </div>
        </div>

        <!-- 🔥 VISTA DINAMICA (AQUÍ SE INYECTA RECUPERACION.HTML, HOME, PERFIL Y DASHBOARD) -->
        <div id="vista-dinamica" class="w-100 d-none fade-view"></div>

    </main>

    <!-- ============================================================================== -->
    <!-- 🎛️ BARRA DE NAVEGACIÓN INFERIOR (ACTUALIZADA CON PERFIL)                     -->
    <!-- ============================================================================== -->
    <nav class="navbar fixed-bottom glass-panel border-0 border-top border-secondary border-opacity-25 rounded-top-4 pb-2 pt-2 px-3 z-3" style="border-bottom-left-radius: 0 !important; border-bottom-right-radius: 0 !important; padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)) !important;">
        <div class="container-fluid d-flex justify-content-around align-items-center m-0 p-0" style="max-width: 600px; margin: 0 auto !important;">
            
            <div class="text-center cursor-pointer text-themed" onclick="cambiarVista('home')" style="width: 70px;">
                <i class="bi bi-house-door-fill fs-4 mb-1 d-block"></i>
                <span class="d-block text-uppercase" style="font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px;">Inicio</span>
            </div>
            
            <!-- NUEVO BOTÓN DE PERFIL -->
            <div id="navBtnPerfil" class="text-center cursor-pointer text-themed d-none flex-column align-items-center" onclick="cambiarVista('perfil')" style="width: 70px;">
                <i class="bi bi-person-badge-fill fs-4 mb-1 d-block"></i>
                <span class="d-block text-uppercase" style="font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px;">Perfil</span>
            </div>

            <div id="navBtnAjustes" class="text-center cursor-pointer text-themed d-none flex-column align-items-center" onclick="cambiarVista('dashboard')" style="width: 70px;">
                <i class="bi bi-gear-fill fs-4 mb-1 d-block"></i>
                <span class="d-block text-uppercase" style="font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px;">Ajustes</span>
            </div>

            <div id="navBtnAuth" class="text-center cursor-pointer text-primary d-flex flex-column align-items-center" onclick="cambiarVista('login')" style="width: 70px;">
                <i class="bi bi-person-fill fs-4 mb-1 d-block"></i>
                <span class="d-block text-uppercase" style="font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px;">Login</span>
            </div>

        </div>
    </nav>

    <!-- ========================================================= -->
    <!-- MODAL REEMPLAZO DE ALERT() NATIVO                         -->
    <!-- ========================================================= -->
    <div class="modal fade" id="appAlertModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content glass-panel text-themed border-secondary border-opacity-25 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-warning fs-6">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> Notificación del Sistema
                    </h5>
                </div>
                <div class="modal-body pt-3 pb-4">
                    <p id="appAlertMessage" class="mb-0 text-muted-themed fw-semibold" style="white-space: pre-wrap; font-size: 0.95rem;"></p>
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-center">
                    <button type="button" class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- LIBRERÍA DE VALIDACIONES -->
    <script src="js/validaciones.js"></script>
    
    <!-- LÓGICA CORE -->
    <script src="js/imageEditor.js"></script>
    <script src="js/index.js"></script>

</body>
</html>

<!-- ============================================================================== -->
<!-- ARCHIVO: index.html -->
<!-- DESCRIPCIÓN: Pantalla principal de la App (Shell) con Login y Registro VIP  -->
<!-- ============================================================================== -->
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>La Tribu - App</title>
    
    <!-- Evitar error 404 de favicon -->
    <link rel="icon" href="data:,">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* ==========================================
           🎨 VARIABLES DE TEMA Y GLASSMORPHISM
           ========================================== */
        :root {
            /* Tema Light (Blanco Hueso Premium) */
            --bg-gradient: linear-gradient(135deg, #fdfbf7 0%, #f0ebe1 100%);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: rgba(0, 0, 0, 0.05);
            --text-primary: #2c2b2a;
            --text-secondary: #6c6a66;
            --input-bg: rgba(255, 255, 255, 0.8);
            --modal-backdrop-bg: rgba(255, 255, 255, 0.3);
        }

        [data-bs-theme="dark"] {
            /* Tema Dark */
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --glass-bg: rgba(18, 20, 24, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --input-bg: rgba(0, 0, 0, 0.25);
            --modal-backdrop-bg: rgba(0, 0, 0, 0.5);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background-attachment: fixed;
            transition: background 0.5s ease, color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        /* 🪟 EFECTO CRISTAL (GLASSMORPHISM) */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px 0 var(--glass-shadow);
            transition: all 0.3s ease;
        }

        /* Modales de Bootstrap ajustados al Glassmorphism */
        .modal-backdrop.show {
            opacity: 1 !important;
            background-color: var(--modal-backdrop-bg) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* ✍️ INPUTS MINIMALISTAS LIMPIOS */
        .input-group-glass {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 1rem; 
            display: flex;
            align-items: stretch;
            transition: all 0.3s ease;
            overflow: hidden; 
        }
        .input-group-glass:focus-within {
            border-color: #0dcaf0;
            box-shadow: 0 0 0 4px rgba(13, 202, 240, 0.15);
            background: var(--glass-bg);
        }
        .icon-box-glass {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0 0.5rem 0 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
        }
        .icon-btn-glass {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0 1.25rem 0 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .icon-btn-glass:hover {
            color: var(--text-primary);
        }
        .form-control-glass {
            background: transparent !important;
            border: none !important;
            color: var(--text-primary) !important;
            padding: 0.85rem 1rem 0.85rem 0.5rem; 
            font-size: 1rem;
            box-shadow: none !important;
            flex-grow: 1;
            min-width: 0; 
        }
        .form-control-glass::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* Utilidades Generales */
        .text-themed { color: var(--text-primary) !important; }
        .text-muted-themed { color: var(--text-secondary) !important; }
        .cursor-pointer { cursor: pointer; }
        .avatar-upload-container:hover .avatar-upload-overlay { opacity: 1 !important; }

        /* Botón Disimulado hacia Dashboard */
        .btn-disimulado {
            opacity: 0.15;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 9999;
        }
        .btn-disimulado:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* Contenedor SPA */
        #app-root {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Animación de Vistas */
        .fade-view {
            animation: fadeIn 0.4s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- ============================================================================== -->
    <!-- BOTÓN DE TEMA (Flotante) -->
    <!-- ============================================================================== -->
    <div class="position-absolute top-0 end-0 p-3" style="z-index: 1000;">
        <button class="btn glass-panel border-0 rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 45px; height: 45px;" id="btnThemeToggle" title="Cambiar Tema">
            <i class="bi bi-sun-fill fs-5" id="themeIcon" style="color: #ffc107;"></i>
        </button>
    </div>

    <!-- ============================================================================== -->
    <!-- CONTENEDOR CENTRAL DE LA APP -->
    <!-- ============================================================================== -->
    <main id="app-root" class="w-100">
        
        <!-- ============================================================================== -->
        <!-- VISTA 1: INICIO DE SESIÓN (LOGIN) -->
        <!-- ============================================================================== -->
        <div id="vista-login" class="w-100 fade-view" style="max-width: 420px;">
            <div class="text-center mb-4">
                <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center shadow" style="width: 70px; height: 70px;">
                    <i class="bi bi-fingerprint fs-1"></i>
                </div>
                <h2 class="fw-bold text-themed mt-3 mb-0">La Tribu</h2>
                <p class="text-muted-themed">Bienvenido de vuelta</p>
            </div>

            <div class="glass-panel p-4 p-md-5">
                <form id="loginForm">
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-muted-themed small px-2 mb-1">Correo Electrónico</label>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-envelope"></i></div>
                            <input type="email" id="loginEmail" class="form-control-glass" placeholder="usuario@correo.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1 px-2">
                            <label class="form-label fw-semibold text-muted-themed small m-0">Contraseña</label>
                            <a href="#" class="text-info small text-decoration-none fw-semibold">¿Olvidaste?</a>
                        </div>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-lock"></i></div>
                            <!-- APLICADO: Máximo de 15 caracteres en Login -->
                            <input type="password" id="loginPass" class="form-control-glass" placeholder="Máx 15 carac." maxlength="15" required>
                            <div class="icon-btn-glass" onclick="togglePassword('loginPass', 'iconLoginPass')">
                                <i class="bi bi-eye" id="iconLoginPass"></i>
                            </div>
                        </div>
                    </div>

                    <!-- APLICADO: Opción de Recordar Contraseña/Correo -->
                    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                        <div class="form-check">
                            <input class="form-check-input border-secondary" type="checkbox" id="rememberMe">
                            <label class="form-check-label small text-muted-themed fw-semibold" for="rememberMe" style="cursor: pointer;">
                                Recordar mi correo
                            </label>
                        </div>
                    </div>

                    <button type="button" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow mt-2" onclick="loginUsuario()">
                        Ingresar <i class="bi bi-arrow-right ms-2"></i>
                    </button>

                    <div class="text-center mt-4 pt-4 border-top border-secondary border-opacity-25">
                        <span class="text-muted-themed small">¿No tienes cuenta? <a href="#" class="text-info fw-bold text-decoration-none ms-1 cursor-pointer" onclick="cambiarVista('registro')">Crear Cuenta</a></span>
                    </div>
                </form>
            </div>
        </div>

        <!-- ============================================================================== -->
        <!-- VISTA 2: REGISTRO VIP (CONECTADO A POCKETBASE) -->
        <!-- ============================================================================== -->
        <div id="vista-registro" class="w-100 d-none fade-view my-4" style="max-width: 650px;">
            <div class="glass-panel p-4 p-md-5 shadow-lg">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-themed mb-4"><i class="bi bi-person-badge text-primary me-2"></i>Únete a La Tribu</h2>
                    
                    <!-- Avatar Upload Enorme -->
                    <div class="position-relative d-inline-block avatar-upload-container cursor-pointer" onclick="document.getElementById('inputAvatarFile').click()">
                        <img id="formAvatarPreview" src="https://ui-avatars.com/api/?name=Nuevo+Usuario&background=random" class="rounded-circle shadow-lg border border-4 border-secondary border-opacity-25" width="130" height="130" style="object-fit: cover; transition: all 0.3s;">
                        <div class="avatar-upload-overlay position-absolute top-0 start-0 w-100 h-100 rounded-circle bg-dark bg-opacity-50 d-flex justify-content-center align-items-center" style="opacity: 0; transition: opacity 0.2s;">
                            <i class="bi bi-camera-fill text-white fs-1"></i>
                        </div>
                        <input type="file" id="inputAvatarFile" class="d-none" accept="image/*" onchange="previsualizarAvatar(event, 'formAvatarPreview')">
                    </div>
                    <div class="small fw-semibold text-muted-themed mt-2">Toque para añadir su foto</div>
                </div>

                <form id="formRegistro" class="text-start mt-4">
                    
                    <!-- Nombres -->
                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Nombres</label>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-person"></i></div>
                            <!-- APLICADO: Validación estricta y Title Case desde validaciones.js -->
                            <input type="text" class="form-control-glass fw-semibold" id="regNombres" placeholder="Ej. Juan Carlos" required oninput="validarNombres(this)" onblur="trimEspacios(this)">
                        </div>
                    </div>

                    <!-- Apellidos -->
                    <div class="row g-3 mb-4">
                        <!-- APLICADO: col-12 en movil (se apilan verticalmente), col-md-6 en escritorio -->
                        <div class="col-12 col-md-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Primer Apellido</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-person-lines-fill"></i></div>
                                <!-- APLICADO: Validación estricta sin espacios -->
                                <input type="text" class="form-control-glass fw-semibold" id="regApellido1" placeholder="Ej. Pérez" required oninput="validarApellidos(this)" onblur="trimEspacios(this)">
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Segundo Apellido</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-person-lines-fill"></i></div>
                                <!-- APLICADO: Validación estricta sin espacios -->
                                <input type="text" class="form-control-glass fw-semibold" id="regApellido2" placeholder="Ej. Silva (Opcional)" oninput="validarApellidos(this)" onblur="trimEspacios(this)">
                            </div>
                        </div>
                    </div>

                    <!-- Correo -->
                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Correo Electrónico</label>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-envelope"></i></div>
                            <input type="email" class="form-control-glass fw-semibold" id="regEmail" placeholder="correo@ejemplo.com" required>
                        </div>
                    </div>

                    <!-- Teléfono -->
                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Teléfono Celular (Exactamente 8 dígitos)</label>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-telephone"></i></div>
                            <input type="text" class="form-control-glass fw-bold" id="regTelefono" placeholder="12345678" maxlength="8" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 8)" required>
                        </div>
                    </div>

                    <!-- Contraseñas (8 a 15 Caracteres) -->
                    <div class="row g-3 mb-5">
                        <!-- APLICADO: col-12 en movil (se apilan verticalmente), col-md-6 en escritorio -->
                        <div class="col-12 col-md-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Crear Contraseña</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-key"></i></div>
                                <!-- APLICADO: Límite extendido a 15 -->
                                <input type="password" class="form-control-glass" id="regPass" placeholder="De 8 a 15 carac." maxlength="15" minlength="8" required>
                                <div class="icon-btn-glass" onclick="togglePassword('regPass', 'iconRegPass1')">
                                    <i class="bi bi-eye" id="iconRegPass1"></i>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Confirmar Contraseña</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-shield-lock-fill"></i></div>
                                <!-- APLICADO: Límite extendido a 15 -->
                                <input type="password" class="form-control-glass" id="regPassConf" placeholder="Repita contraseña" maxlength="15" minlength="8" required>
                                <div class="icon-btn-glass" onclick="togglePassword('regPassConf', 'iconRegPass2')">
                                    <i class="bi bi-eye" id="iconRegPass2"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Botonera -->
                    <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 pt-3 border-top border-secondary border-opacity-25">
                        <button type="button" class="btn btn-outline-secondary rounded-pill fw-bold shadow-sm py-3 px-4 w-100" onclick="cambiarVista('login')">
                            <i class="bi bi-arrow-left me-1"></i> Volver al Login
                        </button>
                        <button type="button" id="btnGuardarRegistro" class="btn btn-primary rounded-pill fw-bold shadow-sm py-3 px-4 w-100" onclick="registrarUsuario()">
                            Crear Cuenta VIP <i class="bi bi-stars ms-1"></i>
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </main>

    <!-- ============================================================================== -->
    <!-- BOTÓN DISIMULADO (HACIA DASHBOARD/CPANEL) -->
    <!-- ============================================================================== -->
    <a href="dashboard.html" class="position-fixed bottom-0 end-0 m-3 btn-disimulado text-themed text-decoration-none" id="adminSecretBtn" title="Ir al Dashboard Administrativo">
        <i class="bi bi-shield-lock-fill fs-2"></i>
    </a>

    <!-- ========================================================= -->
    <!-- MODAL REEMPLAZO DE ALERT() NATIVO                         -->
    <!-- ========================================================= -->
    <div class="modal fade" id="appAlertModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content glass-panel text-themed border-secondary border-opacity-25 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-warning fs-6">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> Notificación del Sistema
                    </h5>
                </div>
                <div class="modal-body pt-3 pb-4">
                    <p id="appAlertMessage" class="mb-0 text-muted-themed fw-semibold" style="white-space: pre-wrap; font-size: 0.95rem;"></p>
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-center">
                    <button type="button" class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- APLICADO: LIBRERÍA MODULARIZADA DE VALIDACIONES -->
    <script src="js/validaciones.js"></script>

    <!-- Scripts de la App -->
    <script>
        // ==============================================================================
        // SECUESTRO DEL ALERT() NATIVO (Notificaciones de Cristal)
        // ==============================================================================
        window.alert = function(message) {
            document.getElementById('appAlertMessage').textContent = message;
            const alertModalElement = document.getElementById('appAlertModal');
            const modalInstance = bootstrap.Modal.getOrCreateInstance(alertModalElement);
            modalInstance.show();
        };

        // ==============================================================================
        // LÓGICA: Cambio de Tema (Dark / Light)
        // ==============================================================================
        const btnThemeToggle = document.getElementById('btnThemeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const htmlElement = document.documentElement;

        const savedTheme = localStorage.getItem('APP_THEME') || 'dark';
        setTheme(savedTheme);

        btnThemeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
            localStorage.setItem('APP_THEME', newTheme);
        });

        function setTheme(theme) {
            htmlElement.setAttribute('data-bs-theme', theme);
            if(theme === 'dark') {
                themeIcon.className = "bi bi-sun-fill fs-5 text-warning"; 
                document.querySelectorAll('.btn-close').forEach(b => b.classList.add('btn-close-white'));
            } else {
                themeIcon.className = "bi bi-moon-stars-fill fs-5 text-dark"; 
                document.querySelectorAll('.btn-close').forEach(b => b.classList.remove('btn-close-white'));
            }
        }

        // ==============================================================================
        // LÓGICA: Recordar Correo al Cargar
        // ==============================================================================
        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('APP_SAVED_EMAIL');
            if(savedEmail) {
                document.getElementById('loginEmail').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        // ==============================================================================
        // LÓGICA: Utilidades del Formulario de la Interfaz
        // ==============================================================================
        function cambiarVista(vista) {
            const vLogin = document.getElementById('vista-login');
            const vRegistro = document.getElementById('vista-registro');

            if (vista === 'registro') {
                vLogin.classList.add('d-none');
                vRegistro.classList.remove('d-none');
            } else {
                vRegistro.classList.add('d-none');
                vLogin.classList.remove('d-none');
            }
        }

        function actualizarAvatarIniciales() {
            const preview = document.getElementById('formAvatarPreview');
            // Evitar sobrescribir si el usuario ya cargó una foto manualmente
            if (preview.src.startsWith('data:image')) return; 

            const nombres = document.getElementById('regNombres').value;
            const apellido1 = document.getElementById('regApellido1').value;
            
            let queryName = "Nuevo+Usuario";
            if (nombres || apellido1) {
                queryName = encodeURIComponent(`${nombres} ${apellido1}`.trim());
            }
            preview.src = `https://ui-avatars.com/api/?name=${queryName}&background=random&size=130`;
        }

        // ==============================================================================
        // 🚀 LÓGICA CORE: CONEXIÓN REAL A POCKETBASE
        // ==============================================================================
        function getApiUrl() {
            const env = localStorage.getItem('APP_ENV') || 'dev';
            return env === 'prod' 
                ? localStorage.getItem('APP_PROD_URL') 
                : (localStorage.getItem('APP_DEV_URL') || 'http://127.0.0.1:8090');
        }

        async function loginUsuario() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if(!email || !pass) return alert("Por favor ingresa tu correo y contraseña.");

            const btn = document.querySelector('#vista-login button.btn-primary');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Autenticando...';
            btn.disabled = true;

            const urlBase = getApiUrl();

            try {
                const res = await fetch(`${urlBase}/api/collections/users/auth-with-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identity: email, password: pass })
                });

                const data = await res.json();

                if(!res.ok) throw new Error("Las credenciales ingresadas son incorrectas o el usuario no existe.");

                // Guardar la sesión
                localStorage.setItem('PB_USER_TOKEN', data.token);
                localStorage.setItem('PB_USER_DATA', JSON.stringify(data.record));

                // Guardar/Olvidar correo según el check
                if(rememberMe) {
                    localStorage.setItem('APP_SAVED_EMAIL', email);
                } else {
                    localStorage.removeItem('APP_SAVED_EMAIL');
                }

                btn.classList.replace('btn-primary', 'btn-success');
                btn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i> ¡Bienvenido!';
                
                // APLICADO: GUARDIA DIRECCIONAL
                setTimeout(() => {
                    if (data.record.rol === 'Superusuario' || data.record.email.toLowerCase() === 'kenth1977@gmail.com') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'base.html';
                    }
                }, 1500);

            } catch(error) {
                alert(error.message);
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        async function registrarUsuario() {
            const iNombres = document.getElementById('regNombres');
            const iApellido1 = document.getElementById('regApellido1');
            const iApellido2 = document.getElementById('regApellido2');
            
            // Garantizar limpieza final de espacios periféricos
            trimEspacios(iNombres);
            trimEspacios(iApellido1);
            trimEspacios(iApellido2);
            
            const nombreCompleto = `${iNombres.value} ${iApellido1.value} ${iApellido2.value}`.replace(/\s+/g, ' ').trim();
            const email = document.getElementById('regEmail').value.trim();
            const telefono = document.getElementById('regTelefono').value;
            const pass = document.getElementById('regPass').value;
            const passConf = document.getElementById('regPassConf').value;

            if(!iNombres.value || !iApellido1.value || !email) return alert("Nombres, Primer Apellido y Correo son obligatorios.");
            
            // 🛑 CANDADO DE TITANIO
            if(email.toLowerCase() === 'kenth1977@gmail.com') {
                return alert("🛑 REGISTRO DENEGADO:\n\nEste correo electrónico está reservado por el sistema. Por favor, utiliza otro correo.");
            }

            if(telefono.length !== 8) return alert("El teléfono debe contener exactamente 8 dígitos numéricos.");
            if(pass.length < 8 || pass.length > 15) return alert("La contraseña debe tener entre 8 y 15 caracteres.");
            if(pass !== passConf) return alert("Las contraseñas no coinciden. Por favor verifica los campos con el botón del ojo.");

            const btn = document.getElementById('btnGuardarRegistro');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Creando Perfil...';
            btn.disabled = true;

            const urlBase = getApiUrl();
            const formData = new FormData();
            
            formData.append('email', email);
            formData.append('password', pass);
            formData.append('passwordConfirm', passConf);
            formData.append('name', nombreCompleto);
            formData.append('telefono', telefono);
            formData.append('rol', 'Usuario'); 
            formData.append('username', "user_" + Date.now()); 

            if (window.archivoAvatarTemp) formData.append('avatar', window.archivoAvatarTemp);

            try {
                const res = await fetch(`${urlBase}/api/collections/users/records`, {
                    method: 'POST',
                    body: formData
                });

                if(!res.ok) {
                    const errorData = await res.json();
                    console.error("Detalle PB:", errorData);
                    
                    let errMsg = "Ocurrió un error en el servidor. Verifica tus datos o intenta más tarde.";
                    
                    // --- 🛑 CAPTURA DE ERROR 400 DE POCKETBASE PARA APP PÚBLICA ---
                    if (errorData.data) {
                        if (errorData.data.email) {
                            errMsg = "🛑 REGISTRO DENEGADO:\n\nEl correo electrónico ya se encuentra registrado. Intenta iniciar sesión o usa otro correo.";
                        } else if (errorData.data.telefono) {
                            errMsg = "🛑 REGISTRO DENEGADO:\n\nEste número de teléfono ya está asociado a otra cuenta.";
                        }
                    } else {
                        errMsg = "El correo ya está registrado o la tabla 'users' no está configurada en PocketBase. Usa el Modo Dios para Auto-Configurar.";
                    }
                    throw new Error(errMsg);
                }

                btn.classList.replace('btn-primary', 'btn-success');
                btn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i> ¡Cuenta Creada Exitosamente!';
                
                // Limpieza post-registro
                setTimeout(() => {
                    btn.classList.replace('btn-success', 'btn-primary');
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    document.getElementById('formRegistro').reset();
                    document.getElementById('formAvatarPreview').src = "https://ui-avatars.com/api/?name=Nuevo+Usuario&background=random";
                    window.archivoAvatarTemp = null;
                    cambiarVista('login');
                }, 3000);

            } catch (error) {
                alert(error.message);
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

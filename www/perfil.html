<!-- ============================================================================== -->
<!-- ARCHIVO: perfil.html (FRAGMENTO SPA)                                           -->
<!-- DESCRIPCIÓN: Edición de datos, cambio de contraseña y Llaves JSON (Storage)    -->
<!-- ============================================================================== -->
<div class="d-flex justify-content-center align-items-start w-100 h-100 mt-5 pt-5 mb-5 pb-5">
    <div class="card glass-panel shadow-lg rounded-4 p-4 p-md-5 mx-3 mx-sm-0 w-100" style="max-width: 600px;">
        
        <!-- CABECERA DEL PERFIL -->
        <div class="text-center mb-4 pb-3 border-bottom border-secondary border-opacity-25">
            <div class="position-relative d-inline-block mb-3 mt-2 avatar-upload-container cursor-pointer" onclick="document.getElementById('perfilAvatarInput').click()">
                <img id="miPerfilAvatar" src="" class="rounded-circle shadow-lg border border-4 border-secondary border-opacity-25" width="130" height="130" style="object-fit: cover; transition: all 0.3s;">
                <div class="avatar-upload-overlay position-absolute top-0 start-0 w-100 h-100 rounded-circle bg-dark bg-opacity-50 d-flex justify-content-center align-items-center" style="opacity: 0; transition: opacity 0.2s;">
                    <i class="bi bi-camera-fill text-white fs-3"></i>
                </div>
                <input type="file" id="perfilAvatarInput" class="d-none" accept="image/*" onchange="typeof previsualizarAvatar === 'function' && previsualizarAvatar(event, 'miPerfilAvatar')">
            </div>
            <h3 class="fw-bold text-themed mb-1" id="miPerfilNombre">Cargando...</h3>
            <p class="text-muted-themed small mb-2" id="miPerfilEmailReadonly"></p>
            <div id="miPerfilRolBadge" class="mb-2"></div>
        </div>

        <!-- NAVEGACIÓN POR PESTAÑAS (TABS) - RESPONSIVO PARA MÓVILES -->
        <ul class="nav nav-pills nav-justified mb-4 gap-1 gap-sm-2" id="perfilTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active rounded-pill fw-bold border border-secondary border-opacity-25 shadow-sm px-2 px-sm-3" id="datos-tab" data-bs-toggle="pill" data-bs-target="#datos-pane" type="button" role="tab" title="Datos Personales">
                    <!-- Icono más grande en móviles, texto oculto -->
                    <i class="bi bi-person-lines-fill fs-5 d-sm-none"></i>
                    <!-- Icono normal y texto en escritorio -->
                    <i class="bi bi-person-lines-fill d-none d-sm-inline"></i>
                    <span class="d-none d-sm-inline ms-1">Datos</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link rounded-pill fw-bold border border-secondary border-opacity-25 shadow-sm px-2 px-sm-3" id="seguridad-tab" data-bs-toggle="pill" data-bs-target="#seguridad-pane" type="button" role="tab" title="Seguridad">
                    <i class="bi bi-shield-lock-fill fs-5 d-sm-none"></i>
                    <i class="bi bi-shield-lock-fill d-none d-sm-inline"></i>
                    <span class="d-none d-sm-inline ms-1">Seguridad</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link rounded-pill fw-bold border border-warning border-opacity-50 shadow-sm text-warning px-2 px-sm-3" id="llave-tab" data-bs-toggle="pill" data-bs-target="#llave-pane" type="button" role="tab" title="Llave de Respaldo">
                    <i class="bi bi-key-fill fs-5 d-sm-none"></i>
                    <i class="bi bi-key-fill d-none d-sm-inline"></i>
                    <span class="d-none d-sm-inline ms-1">Llave</span>
                </button>
            </li>
        </ul>

        <div class="tab-content" id="perfilTabsContent">
            
            <!-- ======================================================== -->
            <!-- PESTAÑA 1: DATOS PERSONALES -->
            <!-- ======================================================== -->
            <div class="tab-pane fade show active" id="datos-pane" role="tabpanel" tabindex="0">
                <div class="p-4 rounded-4 border border-secondary border-opacity-25 text-start" style="background: var(--input-bg);">
                    <h6 class="fw-bold text-themed mb-4"><i class="bi bi-pencil-square text-info me-2"></i>Editar Información</h6>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Nombres</label>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-person"></i></div>
                            <input type="text" class="form-control-glass fw-semibold" id="editNombres" placeholder="Nombres" required oninput="typeof validarNombres==='function'&&validarNombres(this)" onblur="typeof trimEspacios==='function'&&trimEspacios(this)">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Primer Apellido</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-person"></i></div>
                                <input type="text" class="form-control-glass fw-semibold" id="editApellido1" placeholder="Primer Apellido" required oninput="typeof validarApellidos==='function'&&validarApellidos(this)" onblur="typeof trimEspacios==='function'&&trimEspacios(this)">
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Segundo Apellido</label>
                            <div class="input-group-glass">
                                <div class="icon-box-glass"><i class="bi bi-person"></i></div>
                                <input type="text" class="form-control-glass fw-semibold" id="editApellido2" placeholder="Opcional" oninput="typeof validarApellidos==='function'&&validarApellidos(this)" onblur="typeof trimEspacios==='function'&&trimEspacios(this)">
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Teléfono Celular</label>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-telephone"></i></div>
                            <input type="text" class="form-control-glass fw-bold" id="editTelefono" placeholder="12345678" maxlength="8" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 8)">
                        </div>
                    </div>

                    <button type="button" id="btnGuardarPerfilLocal" class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm py-3 mt-2" onclick="guardarDatosPerfilLocal()">
                        Guardar Cambios <i class="bi bi-floppy-fill ms-1"></i>
                    </button>
                </div>
            </div>

            <!-- ======================================================== -->
            <!-- PESTAÑA 2: CAMBIAR CONTRASEÑA -->
            <!-- ======================================================== -->
            <div class="tab-pane fade" id="seguridad-pane" role="tabpanel" tabindex="0">
                <div class="p-4 rounded-4 border border-secondary border-opacity-25 text-start" style="background: var(--input-bg);">
                    <h6 class="fw-bold text-themed mb-4"><i class="bi bi-shield-lock-fill text-danger me-2"></i>Actualizar Contraseña</h6>
                    
                    <!-- Contraseña Actual -->
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Contraseña Actual</label>
                        <div class="input-group-glass">
                            <div class="icon-box-glass"><i class="bi bi-key text-secondary"></i></div>
                            <input type="password" id="editPassActual" class="form-control-glass" placeholder="Tu contraseña actual" maxlength="15" minlength="8">
                            <div class="icon-btn-glass" onclick="typeof togglePassword === 'function' ? togglePassword('editPassActual', 'iconEditPass1') : null">
                                <i class="bi bi-eye" id="iconEditPass1"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Contraseña Nueva -->
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Nueva Contraseña (8-15 carac.)</label>
                        <div class="input-group-glass border-primary border-opacity-50">
                            <div class="icon-box-glass"><i class="bi bi-lock text-primary"></i></div>
                            <input type="password" id="editPassNueva" class="form-control-glass" placeholder="Nueva contraseña" maxlength="15" minlength="8">
                            <div class="icon-btn-glass" onclick="typeof togglePassword === 'function' ? togglePassword('editPassNueva', 'iconEditPass2') : null">
                                <i class="bi bi-eye" id="iconEditPass2"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Confirmar Nueva Contraseña -->
                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Verificar Nueva Contraseña</label>
                        <div class="input-group-glass border-primary border-opacity-50">
                            <div class="icon-box-glass"><i class="bi bi-check-circle-fill text-primary"></i></div>
                            <input type="password" id="editPassConf" class="form-control-glass" placeholder="Repite la nueva contraseña" maxlength="15" minlength="8">
                            <div class="icon-btn-glass" onclick="typeof togglePassword === 'function' ? togglePassword('editPassConf', 'iconEditPass3') : null">
                                <i class="bi bi-eye" id="iconEditPass3"></i>
                            </div>
                        </div>
                    </div>

                    <button type="button" id="btnCambiarPassLocal" class="btn btn-danger text-white w-100 rounded-pill fw-bold shadow-sm py-3 mt-2" onclick="cambiarPasswordLocal()">
                        Cambiar Contraseña <i class="bi bi-shield-check ms-1"></i>
                    </button>
                </div>
            </div>

            <!-- ======================================================== -->
            <!-- PESTAÑA 3: LLAVE DE SEGURIDAD -->
            <!-- ======================================================== -->
            <div class="tab-pane fade" id="llave-pane" role="tabpanel" tabindex="0">
                <div class="p-4 rounded-4 border border-warning border-opacity-50 text-start" style="background: rgba(255, 193, 7, 0.05);">
                    <h6 class="fw-bold text-warning mb-2"><i class="bi bi-usb-drive-fill me-2"></i>Copia de Seguridad (Cold Storage)</h6>
                    <p class="text-muted-themed small mb-3">Si perdiste tu archivo original o cambiaste tu contraseña recientemente, genera una nueva llave aquí.</p>
                    
                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-warning mb-1 px-2">Confirma tu Contraseña para Encriptar</label>
                        <div class="input-group-glass border-warning border-opacity-50">
                            <div class="icon-box-glass"><i class="bi bi-lock text-warning"></i></div>
                            <input type="password" id="miPerfilPassKey" class="form-control-glass" placeholder="Contraseña de tu cuenta" required>
                            <div class="icon-btn-glass" onclick="typeof togglePassword === 'function' ? togglePassword('miPerfilPassKey', 'iconMiPerfilPassKey') : null">
                                <i class="bi bi-eye" id="iconMiPerfilPassKey"></i>
                            </div>
                        </div>
                    </div>

                    <button type="button" id="btnDescargarMiLlave" class="btn btn-warning text-dark w-100 rounded-pill fw-bold shadow-sm py-3" onclick="generarCopiaLlaveJSON()">
                        <i class="bi bi-cloud-arrow-down-fill me-1"></i> Descargar Llave Segura
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // ============================================================================
    // 1. CARGAR DATOS AL INYECTAR LA VISTA
    // ============================================================================
    setTimeout(() => {
        const userStr = localStorage.getItem('PB_USER_DATA');
        if (userStr) {
            const user = JSON.parse(userStr);
            const nombreCompleto = user.name || user.username || 'Usuario VIP';
            
            document.getElementById('miPerfilNombre').innerText = nombreCompleto;
            document.getElementById('miPerfilEmailReadonly').innerText = user.email || 'Sin correo registrado';
            
            // Etiqueta de Rol
            const rolBadge = document.getElementById('miPerfilRolBadge');
            if (user.rol === 'Superusuario') {
                rolBadge.innerHTML = '<span class="badge bg-danger rounded-pill px-3 py-2 shadow-sm"><i class="bi bi-lightning-fill"></i> Superusuario</span>';
            } else if (user.rol === 'Administrador') {
                rolBadge.innerHTML = '<span class="badge bg-warning text-dark rounded-pill px-3 py-2 shadow-sm"><i class="bi bi-shield-fill-check"></i> Administrador</span>';
            } else {
                rolBadge.innerHTML = '<span class="badge bg-primary rounded-pill px-3 py-2 shadow-sm"><i class="bi bi-person-fill"></i> Usuario Regular</span>';
            }
            
            // Imagen de Avatar
            const preview = document.getElementById('miPerfilAvatar');
            if (user.avatar) {
                const urlBase = typeof getApiUrl === 'function' ? getApiUrl() : 'http://127.0.0.1:8090';
                const colName = user.collectionName || 'users';
                preview.src = `${urlBase}/api/files/${colName}/${user.id}/${user.avatar}`;
            } else {
                const queryName = encodeURIComponent(nombreCompleto.trim());
                preview.src = `https://ui-avatars.com/api/?name=${queryName}&background=random&size=130`;
            }

            // Pre-llenar Formulario Datos
            const partes = (nombreCompleto || "").trim().split(' ');
            const iNombres = document.getElementById('editNombres');
            const iApellido1 = document.getElementById('editApellido1');
            const iApellido2 = document.getElementById('editApellido2');
            
            if(partes.length === 1) { iNombres.value=partes[0]; iApellido1.value=""; iApellido2.value=""; }
            else if(partes.length === 2) { iNombres.value=partes[0]; iApellido1.value=partes[1]; iApellido2.value=""; }
            else if(partes.length >= 3) { iApellido2.value=partes.pop(); iApellido1.value=partes.pop(); iNombres.value=partes.join(' '); }
            
            document.getElementById('editTelefono').value = user.telefono || "";
        } else {
            alert("No hay una sesión activa. Redirigiendo al login.");
            cambiarVista('login');
        }
    }, 150);

    // ============================================================================
    // 2. ACTUALIZAR INFORMACIÓN PERSONAL
    // ============================================================================
    window.guardarDatosPerfilLocal = async function() {
        const iNombres = document.getElementById('editNombres');
        const iApellido1 = document.getElementById('editApellido1');
        const iApellido2 = document.getElementById('editApellido2');
        const iTelefono = document.getElementById('editTelefono');
        
        if (typeof trimEspacios === "function") {
            trimEspacios(iNombres); trimEspacios(iApellido1); trimEspacios(iApellido2);
        }
        
        const nombreCompleto = `${iNombres.value} ${iApellido1.value} ${iApellido2.value}`.replace(/\s+/g, ' ').trim();
        const telefono = iTelefono.value;

        if(!iNombres.value || !iApellido1.value) return alert("Los Nombres y el Primer Apellido son obligatorios.");
        if(telefono && telefono.length !== 8) return alert("El teléfono celular debe contener exactamente 8 dígitos.");

        const btn = document.getElementById('btnGuardarPerfilLocal');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Guardando...';
        btn.disabled = true;

        try {
            const user = JSON.parse(localStorage.getItem('PB_USER_DATA'));
            const token = localStorage.getItem('PB_USER_TOKEN');
            const urlBase = typeof getApiUrl === 'function' ? getApiUrl() : 'http://127.0.0.1:8090';
            
            const formData = new FormData();
            formData.append('name', nombreCompleto);
            formData.append('telefono', telefono);
            
            if (window.archivoAvatarTemp) formData.append('avatar', window.archivoAvatarTemp);

            const colTarget = user.collectionName || (user.rol === 'Superusuario' ? '_superusers' : 'users');

            const res = await fetch(`${urlBase}/api/collections/${colTarget}/records/${user.id}`, {
                method: 'PATCH',
                headers: { 'Authorization': token },
                body: formData
            });

            if(!res.ok) throw new Error("No se pudieron guardar los cambios en la base de datos. Verifica tu conexión.");

            const updatedData = await res.json();
            
            // Preservar rol localmente por seguridad
            updatedData.rol = user.rol;
            
            // Actualizar Caché Local
            localStorage.setItem('PB_USER_DATA', JSON.stringify(updatedData));
            window.archivoAvatarTemp = null;

            btn.classList.replace('btn-primary', 'btn-success');
            btn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i> ¡Guardado Exitosamente!';

            // Actualizar la Interfaz Local visualmente sin recargar
            document.getElementById('miPerfilNombre').innerText = nombreCompleto;

            setTimeout(() => {
                btn.classList.replace('btn-success', 'btn-primary');
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }, 2000);

        } catch (error) {
            alert(error.message);
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }
    };

    // ============================================================================
    // 3. CAMBIAR CONTRASEÑA (SERVICIO DE SEGURIDAD)
    // ============================================================================
    window.cambiarPasswordLocal = async function() {
        const pActual = document.getElementById('editPassActual').value;
        const pNuevo = document.getElementById('editPassNueva').value;
        const pConf = document.getElementById('editPassConf').value;

        if (!pActual || !pNuevo || !pConf) return alert("Por favor, completa los 3 campos de contraseña.");
        if (pNuevo.length < 8 || pNuevo.length > 15) return alert("La nueva contraseña debe tener entre 8 y 15 caracteres.");
        if (pNuevo !== pConf) return alert("Las contraseñas nuevas no coinciden. Usa el botón del 'ojo' para verificarlas.");

        const btn = document.getElementById('btnCambiarPassLocal');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Autorizando...';
        btn.disabled = true;

        try {
            const user = JSON.parse(localStorage.getItem('PB_USER_DATA'));
            const token = localStorage.getItem('PB_USER_TOKEN');
            const urlBase = typeof getApiUrl === 'function' ? getApiUrl() : 'http://127.0.0.1:8090';
            
            const colTarget = user.collectionName || (user.rol === 'Superusuario' ? '_superusers' : 'users');
            const patchData = { oldPassword: pActual, password: pNuevo, passwordConfirm: pConf };
            
            const res = await fetch(`${urlBase}/api/collections/${colTarget}/records/${user.id}`, {
                method: 'PATCH',
                headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                body: JSON.stringify(patchData)
            });

            if(!res.ok) {
                const err = await res.json().catch(()=>({}));
                throw new Error("La Contraseña Actual es incorrecta. Si la olvidaste, sal del sistema y usa la Llave JSON para recuperarla.");
            }

            btn.classList.replace('btn-danger', 'btn-success');
            btn.innerHTML = '<i class="bi bi-shield-check me-2"></i> ¡Contraseña Actualizada!';

            setTimeout(() => {
                alert("✅ ¡ÉXITO! Tu contraseña ha sido actualizada.\n\n⚠️ ATENCIÓN: Tu llave JSON antigua ya no sirve con esta nueva contraseña. Ve a la pestaña 'Llave' para descargar una nueva.");
                btn.classList.replace('btn-success', 'btn-danger');
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                
                // Limpiar Cajas
                document.getElementById('editPassActual').value = '';
                document.getElementById('editPassNueva').value = '';
                document.getElementById('editPassConf').value = '';
                
                // Enviar visualmente al usuario a la pestaña Llave
                const triggerEl = document.querySelector('#llave-tab');
                if(triggerEl && typeof bootstrap !== 'undefined') {
                    const tab = new bootstrap.Tab(triggerEl);
                    tab.show();
                }
            }, 1500);

        } catch (error) {
            alert(error.message);
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }
    };

    // ============================================================================
    // 4. GENERAR NUEVA COPIA DE SEGURIDAD (LLAVE JSON COLD STORAGE)
    // ============================================================================
    window.generarCopiaLlaveJSON = async function() {
        const pass = document.getElementById('miPerfilPassKey').value;
        if(!pass) return alert("Por favor, ingresa tu contraseña actual para poder encriptar la llave de seguridad.");

        const btn = document.getElementById('btnDescargarMiLlave');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Encriptando Llave...';
        btn.disabled = true;

        try {
            const userStr = localStorage.getItem('PB_USER_DATA');
            if(!userStr) throw new Error("No hay sesión activa.");
            const user = JSON.parse(userStr);
            
            const urlBase = typeof getApiUrl === 'function' ? getApiUrl() : 'http://127.0.0.1:8090';
            
            // Verificamos que la contraseña ingresada sea correcta usando Lógica Cascada de Autenticación
            let authRes = await fetch(urlBase + '/api/collections/users/auth-with-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identity: user.email, password: pass })
            });

            if (!authRes.ok) {
                authRes = await fetch(urlBase + '/api/collections/_superusers/auth-with-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identity: user.email, password: pass })
                });
                if(!authRes.ok) {
                    authRes = await fetch(urlBase + '/api/admins/auth-with-password', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ identity: user.email, password: pass })
                    });
                    if(!authRes.ok) throw new Error("La contraseña ingresada es incorrecta. No se puede encriptar la llave.");
                }
            }

            // Generar la llave exacta con encriptación (Cold Storage Vault)
            const hashSeguro = btoa(unescape(encodeURIComponent(pass)));
            const keyData = {
                app: "La Tribu",
                fecha: new Date().toISOString(),
                email: user.email,
                telefono: user.telefono || "SUPERUSUARIO",
                pin: user.pin_recuperacion || "MASTER",
                hash_seguridad: hashSeguro
            };
            
            const jsonString = JSON.stringify(keyData);
            const payloadEncriptado = btoa(unescape(encodeURIComponent(jsonString))).split('').reverse().join('');
            
            const secureVault = {
                _advertencia: "COPIA DE SEGURIDAD ENCRIPTADA MODO COLD STORAGE. NO MODIFICAR NINGUN CARACTER.",
                tribu_secure_vault: payloadEncriptado
            };
            
            const blob = new Blob([JSON.stringify(secureVault, null, 2)], { type: "application/json" });
            const urlObj = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = urlObj;
            a.download = `Copia_Seguridad_Tribu_${user.telefono || 'Master'}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(urlObj);

            btn.classList.replace('btn-warning', 'btn-success');
            btn.classList.replace('text-dark', 'text-white');
            btn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i> ¡Llave Descargada!';
            
            setTimeout(() => {
                alert("✅ LLAVE JSON DESCARGADA CON ÉXITO.\n\nPor favor, guárdala en un lugar seguro (Como tu Google Drive, Correo o USB) y NO le cambies el contenido interno.");
                btn.classList.replace('btn-success', 'btn-warning');
                btn.classList.replace('text-white', 'text-dark');
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                document.getElementById('miPerfilPassKey').value = '';
            }, 1500);

        } catch (error) {
            alert(error.message);
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }
    };
</script>

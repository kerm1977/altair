<!-- ============================================================================== -->
<!-- ARCHIVO: recuperacion.html (FRAGMENTO SPA)                                     -->
<!-- DESCRIPCIÓN: Lector de llave JSON. Se inyecta visualmente en index.html        -->
<!-- ============================================================================== -->
<div class="d-flex justify-content-center align-items-center w-100 h-100 mt-md-5 pt-md-4">
    <div class="card glass-panel shadow-lg rounded-4 p-4 p-md-5 mx-3 mx-sm-0 w-100" style="max-width: 500px;">
        
        <div class="d-flex align-items-center mb-4 gap-3">
            <button class="btn btn-outline-secondary rounded-circle p-0 d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px;" onclick="cambiarVista('login')" title="Volver">
                <i class="bi bi-arrow-left"></i>
            </button>
            <h3 class="fw-bold text-themed m-0"><i class="bi bi-usb-drive-fill text-warning me-2"></i> Recuperación</h3>
        </div>
        
        <div id="recuperacionLector">
            <p class="text-muted-themed small mb-4">El día de tu registro (o rescate) se descargó una <strong>Llave JSON Encriptada</strong> a tu dispositivo. Súbela para validar tu identidad.</p>
            
            <div class="border border-secondary border-opacity-50 rounded-4 p-4 text-center cursor-pointer mb-4" style="border-style: dashed !important; background: var(--glass-bg); transition: all 0.3s;" onmouseover="this.style.borderColor='#ffc107'; this.style.backgroundColor='rgba(255, 193, 7, 0.05)';" onmouseout="this.style.borderColor=''; this.style.backgroundColor='var(--glass-bg)';" onclick="document.getElementById('recoveryFileInput').click()">
                <i class="bi bi-filetype-json text-warning mb-2 d-block" style="font-size: 4rem;"></i>
                <h6 class="fw-bold text-themed">Toca aquí para buscar el archivo</h6>
                <span class="small text-muted-themed" id="recoveryFileName">Ningún archivo seleccionado</span>
                
                <input type="file" id="recoveryFileInput" class="d-none" accept=".json" onchange="leerLlaveRecuperacionJSON(event)">
            </div>

            <button type="button" id="btnVerificarLlave" class="btn btn-warning text-dark w-100 rounded-pill fw-bold py-3 shadow-sm" onclick="validarYPasarAReset()" disabled>
                Desencriptar y Desbloquear <i class="bi bi-unlock-fill ms-1"></i>
            </button>
        </div>
    </div>
</div>

<script>
    // Limpiamos memoria
    window.tempRecoveryData = null;

    window.leerLlaveRecuperacionJSON = function(event) {
        var file = event.target.files[0];
        var nameLabel = document.getElementById('recoveryFileName');
        var btnVerificar = document.getElementById('btnVerificarLlave');
        
        if (file) {
            if (!file.name.toLowerCase().endsWith('.json')) {
                alert("Formato inválido. Por favor, sube únicamente tu archivo .json.");
                event.target.value = "";
                return;
            }
            nameLabel.innerText = file.name;
            nameLabel.classList.replace('text-muted-themed', 'text-success');
            nameLabel.classList.add('fw-bold');

            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var vaultData = JSON.parse(e.target.result);
                    
                    // 1. Encriptada (Secure Vault)
                    if (vaultData.tribu_secure_vault) {
                        var reversedStr = vaultData.tribu_secure_vault.split('').reverse().join('');
                        var decryptedStr = decodeURIComponent(escape(atob(reversedStr)));
                        var realData = JSON.parse(decryptedStr);
                        
                        if (realData.email && realData.pin && realData.hash_seguridad) {
                            window.tempRecoveryData = realData;
                            btnVerificar.disabled = false;
                            btnVerificar.classList.replace('btn-warning', 'btn-success');
                        } else {
                            alert("Archivo JSON corrupto.");
                            btnVerificar.disabled = true;
                        }
                    } 
                    // 2. Vieja sin encriptar (Compatibilidad con tus primeras pruebas)
                    else if (vaultData.email && vaultData.pin && vaultData.hash_seguridad) {
                        window.tempRecoveryData = vaultData;
                        btnVerificar.disabled = false;
                        btnVerificar.classList.replace('btn-warning', 'btn-success');
                    } else {
                        alert("Archivo JSON inválido. No pertenece a La Tribu.");
                        btnVerificar.disabled = true;
                    }
                } catch (err) {
                    alert("Error crítico: El archivo ha sido modificado y la llave destruida.");
                    btnVerificar.disabled = true;
                }
            };
            reader.readAsText(file);
        }
    };

    window.validarYPasarAReset = function() {
        if (!window.tempRecoveryData) return alert("Carga un archivo válido.");
        window.resetKeyData = window.tempRecoveryData; 
        alert("✅ Llave Verificada.\n\nProcediendo a la bóveda de restablecimiento.");
        cambiarVista('resetPass'); // Llama al Router SPA de index.html
    };
</script>

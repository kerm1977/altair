<div class="container fade-view pt-4 pb-5 mb-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card glass-panel shadow-lg rounded-4 p-4 p-md-5 mx-3 mx-sm-0 w-100" style="max-width: 500px;">
        
        <div class="d-flex align-items-center mb-4 gap-3">
            <button class="btn btn-outline-secondary rounded-circle p-0 d-flex align-items-center justify-content-center shadow-sm" style="width: 40px; height: 40px;" onclick="cambiarVista('login')" title="Volver">
                <i class="bi bi-arrow-left"></i>
            </button>
            <h3 class="fw-bold text-themed m-0"><i class="bi bi-key-fill text-warning me-2"></i> Llave Maestra</h3>
        </div>
        
        <div id="recuperacionPaso1">
            <p class="text-muted-themed small mb-4">El día de tu registro se descargó una <strong>Llave JSON de Seguridad</strong>. Súbela para validar tu identidad sin necesidad de internet.</p>
            
            <div class="border border-secondary border-opacity-50 rounded-4 p-4 text-center cursor-pointer mb-4" style="border-style: dashed !important; background: var(--input-bg); transition: all 0.3s;" onmouseover="this.style.borderColor='#0dcaf0'; this.style.backgroundColor='rgba(13,202,240,0.05)';" onmouseout="this.style.borderColor=''; this.style.backgroundColor='var(--input-bg)';" onclick="document.getElementById('recoveryFileInput').click()">
                <i class="bi bi-file-earmark-lock-fill text-info mb-2 d-block" style="font-size: 3rem;"></i>
                <h6 class="fw-bold text-themed">Toca para Cargar tu Archivo .JSON</h6>
                <span class="small text-muted-themed" id="recoveryFileName">Ningún archivo seleccionado</span>
                <input type="file" id="recoveryFileInput" class="d-none" accept=".json" onchange="window.leerLlaveRecuperacion(event)">
            </div>

            <button type="button" id="btnVerificarRecuperacion" class="btn btn-primary w-100 rounded-pill fw-bold py-3 shadow-sm" onclick="procesarRecuperacion()" disabled>
                Desbloquear Cuenta <i class="bi bi-unlock-fill ms-1"></i>
            </button>
        </div>
    </div>
</div>

<script>
    window.tempRecoveryData = null;

    window.leerLlaveRecuperacion = function(event) {
        var file = event.target.files[0];
        var nameLabel = document.getElementById('recoveryFileName');
        var btnVerificar = document.getElementById('btnVerificarRecuperacion');
        
        if (file) {
            if (!file.name.endsWith('.json')) {
                alert("Por favor, sube únicamente un archivo JSON de Llave de Recuperación.");
                event.target.value = "";
                return;
            }
            nameLabel.innerText = file.name;
            nameLabel.classList.replace('text-muted-themed', 'text-success');
            nameLabel.classList.add('fw-bold');

            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var data = JSON.parse(e.target.result);
                    if (data.email && data.pin && data.hash_seguridad) {
                        window.tempRecoveryData = data;
                        btnVerificar.disabled = false;
                    } else {
                        alert("El archivo JSON está corrupto o no pertenece a la seguridad de La Tribu.");
                        btnVerificar.disabled = true;
                    }
                } catch (err) {
                    alert("Error crítico: El archivo subido no es un formato JSON válido.");
                    btnVerificar.disabled = true;
                }
            };
            reader.readAsText(file);
        }
    };
</script>

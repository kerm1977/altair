<!-- ============================================================================== -->
<!-- ARCHIVO: resetPass.html (FRAGMENTO SPA)                                        -->
<!-- DESCRIPCIÓN: Cambia la clave en BD y genera la NUEVA Llave JSON Encriptada.    -->
<!-- ============================================================================== -->
<div class="d-flex justify-content-center align-items-center w-100 h-100 mt-md-5 pt-md-4">
    <div class="card glass-panel shadow-lg rounded-4 p-4 p-md-5 mx-3 mx-sm-0 w-100" style="max-width: 500px;">
        
        <div class="text-center mb-4">
            <div class="bg-success bg-opacity-25 text-success rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 70px; height: 70px;">
                <i class="bi bi-shield-check fs-1"></i>
            </div>
            <h3 class="fw-bold text-themed m-0">Acceso Autorizado</h3>
            <p class="text-info small fw-bold mt-2 mb-0" id="resetUserEmail">Cargando...</p>
            <p class="text-muted-themed small mt-1">Crea una nueva contraseña para restaurar el acceso a tu cuenta.</p>
        </div>
        
        <div class="mb-3">
            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Nueva Contraseña</label>
            <div class="input-group-glass">
                <div class="icon-box-glass"><i class="bi bi-lock"></i></div>
                <input type="password" id="resetNewPass" class="form-control-glass" placeholder="De 8 a 15 carac." maxlength="15" minlength="8">
                <div class="icon-btn-glass" onclick="typeof togglePassword === 'function' ? togglePassword('resetNewPass', 'iconReset1') : null">
                    <i class="bi bi-eye" id="iconReset1"></i>
                </div>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Confirmar Contraseña</label>
            <div class="input-group-glass">
                <div class="icon-box-glass"><i class="bi bi-check-circle-fill"></i></div>
                <input type="password" id="resetConfPass" class="form-control-glass" placeholder="Repite la contraseña" maxlength="15" minlength="8">
                <div class="icon-btn-glass" onclick="typeof togglePassword === 'function' ? togglePassword('resetConfPass', 'iconReset2') : null">
                    <i class="bi bi-eye" id="iconReset2"></i>
                </div>
            </div>
        </div>

        <button type="button" id="btnEjecutarResetFinal" class="btn btn-warning text-dark w-100 rounded-pill fw-bold shadow-sm py-3 mt-2" onclick="ejecutarResetPassword()">
            Actualizar y Sellar Bóveda <i class="bi bi-floppy-fill ms-1"></i>
        </button>
        <button type="button" class="btn btn-outline-secondary w-100 rounded-pill fw-bold py-2 mt-3" onclick="cancelarRestablecimiento()">
            Cancelar
        </button>
        
    </div>
</div>

<script>
    // 1. Validación inicial de la memoria al cargar la vista
    setTimeout(() => {
        if (window.resetKeyData && window.resetKeyData.email) {
            document.getElementById('resetUserEmail').innerText = window.resetKeyData.email;
        } else {
            alert("Acceso Inválido: La llave de memoria expiró o no se cargó correctamente. Sube tu archivo nuevamente.");
            cambiarVista('recuperacion');
        }
    }, 100);

    // Cancelar y limpiar memoria
    window.cancelarRestablecimiento = function() {
        window.resetKeyData = null;
        window.tempRecoveryData = null;
        cambiarVista('login');
    }

    // 2. Ejecutar el cambio en BD y generar nueva llave encriptada
    window.ejecutarResetPassword = async function() {
        var pNuevo = document.getElementById('resetNewPass').value;
        var pConf = document.getElementById('resetConfPass').value;

        if(!window.resetKeyData) return alert("Error Crítico: Llave JSON perdida en memoria.");
        if(pNuevo.length < 8 || pNuevo.length > 15) return alert("La nueva contraseña debe tener entre 8 y 15 caracteres.");
        if(pNuevo !== pConf) return alert("Las contraseñas no coinciden.");

        var btn = document.getElementById('btnEjecutarResetFinal');
        var originalHTML = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Autorizando...';
        btn.disabled = true;

        try {
            const urlBase = typeof getApiUrl === 'function' ? getApiUrl() : 'http://127.0.0.1:8090';
            const email = window.resetKeyData.email;
            
            // Desciframos la contraseña vieja que el JSON tenía escondida
            const oldPass = decodeURIComponent(escape(atob(window.resetKeyData.hash_seguridad))); 
            
            let authData = {};
            let targetCollection = 'users';

            // A. Autenticar con PocketBase usando Lógica en Cascada (Waterfall)
            // Primero intentamos en Usuarios Regulares
            let authRes = await fetch(urlBase + '/api/collections/users/auth-with-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identity: email, password: oldPass })
            });

            if (!authRes.ok) {
                // Si falla, intentamos en Superusuarios (v0.23)
                authRes = await fetch(urlBase + '/api/collections/_superusers/auth-with-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identity: email, password: oldPass })
                });
                targetCollection = '_superusers';

                if (!authRes.ok) {
                    // Si falla, intentamos en Admins (Compatibilidad v0.22)
                    authRes = await fetch(urlBase + '/api/admins/auth-with-password', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ identity: email, password: oldPass })
                    });
                    targetCollection = 'admins';

                    // Si fallan los 3, la llave es inválida definitivamente
                    if (!authRes.ok) {
                        throw new Error("La Llave JSON que subiste es antigua u obsoleta. Tu contraseña ya fue cambiada previamente con una llave más nueva.");
                    }
                }
            }

            authData = await authRes.json();
            
            // Extraer el ID independientemente de si es 'record' o 'admin'
            const userId = authData.record ? authData.record.id : (authData.admin ? authData.admin.id : null);
            if(!userId) throw new Error("Fallo extrayendo el ID del usuario.");

            // B. Actualizar a la nueva contraseña en PocketBase
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Sellando Bóveda...';
            
            const patchData = { oldPassword: oldPass, password: pNuevo, passwordConfirm: pConf };
            let patchUrl = urlBase + '/api/collections/' + targetCollection + '/records/' + userId;
            if (targetCollection === 'admins') patchUrl = urlBase + '/api/admins/' + userId;

            const patchRes = await fetch(patchUrl, {
                method: 'PATCH',
                headers: { 'Authorization': authData.token, 'Content-Type': 'application/json' },
                body: JSON.stringify(patchData)
            });

            if (!patchRes.ok) {
                const errInfo = await patchRes.json().catch(()=>({}));
                throw new Error("Fallo de sincronización con la Base de Datos. " + (errInfo.message || ""));
            }

            // C. Generar la NUEVA Llave JSON de Seguridad (ENCRIPTADA)
            const newKeyData = {
                app: "La Tribu",
                fecha: new Date().toISOString(),
                email: email,
                telefono: window.resetKeyData.telefono || "SUPERUSUARIO",
                pin: window.resetKeyData.pin || "MASTER",
                hash_seguridad: btoa(unescape(encodeURIComponent(pNuevo))) // Nuevo hash basado en la clave nueva
            };
            
            const jsonString = JSON.stringify(newKeyData);
            const payloadEncriptado = btoa(unescape(encodeURIComponent(jsonString))).split('').reverse().join('');
            
            const secureVault = {
                _advertencia: "NUEVO ARCHIVO ENCRIPTADO. LA LLAVE ANTERIOR HA SIDO DESTRUIDA Y YA NO SIRVE.",
                tribu_secure_vault: payloadEncriptado
            };
            
            const blob = new Blob([JSON.stringify(secureVault, null, 2)], { type: "application/json" });
            const urlObj = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = urlObj;
            a.download = `NUEVA_Llave_Recuperacion_Tribu_${window.resetKeyData.telefono || 'Master'}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(urlObj);

            btn.classList.replace('btn-warning', 'btn-success');
            btn.classList.replace('text-dark', 'text-white');
            btn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i> ¡Completado!';

            setTimeout(() => {
                alert("¡ÉXITO! Su contraseña ha sido cambiada permanentemente.\n\n⚠️ ATENCIÓN: Se ha descargado una NUEVA Llave Encriptada. La llave que usaste hoy YA NO SIRVE y debes borrarla de tu dispositivo. Solo la nueva llave te protegerá en el futuro.");
                
                window.resetKeyData = null;
                window.tempRecoveryData = null;
                
                cambiarVista('login');
            }, 1500);

        } catch(error) {
            alert(error.message);
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }
    };
</script>

<!-- ARCHIVO: resetPass.html                                                        -->
<!-- DESCRIPCIÓN: Módulo de actualización de contraseña mediante Llave JSON         -->
<!-- ============================================================================== -->
<div class="container fade-view pt-4 pb-5 mb-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    
    <div class="card glass-panel shadow-lg rounded-4 p-4 p-md-5 mx-3 mx-sm-0 w-100" style="max-width: 500px;">
        
        <div class="text-center mb-4">
            <div class="bg-warning bg-opacity-25 text-warning rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 70px; height: 70px;">
                <i class="bi bi-shield-lock-fill fs-1"></i>
            </div>
            <h3 class="fw-bold text-themed m-0" id="resetUserEmail">Nueva Contraseña</h3>
            <p class="text-muted-themed small mt-2">Crea una nueva contraseña para restaurar el acceso a tu cuenta.</p>
        </div>
        
        <div class="mb-3">
            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Nueva Contraseña</label>
            <div class="input-group-glass">
                <div class="icon-box-glass"><i class="bi bi-lock"></i></div>
                <input type="password" id="resetNewPass" class="form-control-glass" placeholder="De 8 a 15 carac." maxlength="15" minlength="8">
                <div class="icon-btn-glass" onclick="typeof togglePassword === 'function' ? togglePassword('resetNewPass', 'iconReset1') : null">
                    <i class="bi bi-eye" id="iconReset1"></i>
                </div>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="form-label small fw-semibold text-muted-themed mb-1 px-2">Confirmar Contraseña</label>
            <div class="input-group-glass">
                <div class="icon-box-glass"><i class="bi bi-check-circle-fill"></i></div>
                <input type="password" id="resetConfPass" class="form-control-glass" placeholder="Repite la contraseña" maxlength="15" minlength="8">
                <div class="icon-btn-glass" onclick="typeof togglePassword === 'function' ? togglePassword('resetConfPass', 'iconReset2') : null">
                    <i class="bi bi-eye" id="iconReset2"></i>
                </div>
            </div>
        </div>

        <button type="button" id="btnEjecutarResetFinal" class="btn btn-warning text-dark w-100 rounded-pill fw-bold shadow-sm py-3 mt-2" onclick="typeof ejecutarResetPassword === 'function' ? ejecutarResetPassword() : null">
            Actualizar y Asegurar <i class="bi bi-floppy-fill ms-1"></i>
        </button>
        <button type="button" class="btn btn-outline-secondary w-100 rounded-pill fw-bold py-2 mt-3" onclick="cambiarVista('login')">
            Cancelar
        </button>
        
    </div>
</div>

<script>
    setTimeout(() => {
        // Valida que el paso anterior del JSON haya sido correcto y traiga los datos
        if (window.resetKeyData && window.resetKeyData.email) {
            document.getElementById('resetUserEmail').innerText = window.resetKeyData.email;
        } else {
            alert("Acceso Inválido: La llave de memoria expiró o no se cargó correctamente. Sube tu archivo nuevamente.");
            cambiarVista('recuperacion');
        }
    }, 100);
</script>
